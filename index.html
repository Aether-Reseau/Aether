<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#f5f0ea;font-size:16px;overscroll-behavior:none;}
#root{height:100%;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
textarea,input{-webkit-appearance:none;appearance:none;border-radius:0;}
textarea::placeholder,input::placeholder{color:#b5afa8;font-family:'Lora',serif;}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#d5cfc8;border-radius:3px}
button{-webkit-appearance:none;touch-action:manipulation;}
.spinner{width:36px;height:36px;border:3px solid #ede8e0;border-top-color:#2a2420;border-radius:50%;animation:spin 0.7s linear infinite;}

/* ══════════════════════════════════════════
   ÆTHER — PREMIUM UI SYSTEM 2026
   ══════════════════════════════════════════ */

/* Fonts */
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap');

/* Tokens */
:root {
  --bg: #f7f3ee;
  --font-emoji: 'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
  --surface: #ffffff;
  --surface-2: #faf7f3;
  --surface-3: #f3ede5;
  --border: rgba(0,0,0,0.06);
  --border-strong: rgba(0,0,0,0.1);
  --text-primary: #1a1714;
  --text-secondary: #6b6560;
  --text-muted: #a09890;
  --accent: #c17a4a;
  --accent-light: rgba(193,122,74,0.1);
  --accent-hover: #a86840;
  --danger: #c0392b;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-hover: 0 12px 40px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
}

/* Base */
*, *::before, *::after { box-sizing: border-box; margin: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text-primary); word-break: break-word; overflow-wrap: break-word; }

/* Global text overflow prevention */
p, span, div, h1, h2, h3, a {
  overflow-wrap: break-word;
  word-break: break-word;
}

/* Post content */
.post-content {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
  max-width: 100%;
}

/* All cards - prevent overflow */
.ae-card, .ae-post, .ae-panel-card {
  overflow: hidden;
  min-width: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 99px; }

/* Typography */
h1,h2,h3 { font-family: 'Lora', serif; font-weight: 500; letter-spacing: -0.02em; }

/* Cards — floating with subtle shadow */
.ae-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.ae-card:hover { box-shadow: var(--shadow-md); }

/* Post cards — special treatment */
.ae-post {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: box-shadow 0.25s ease, transform 0.25s ease;
}
.ae-post:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

/* Action buttons */
.ae-action {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  transition: var(--transition);
  font-family: 'DM Sans', sans-serif;
}
.ae-action:hover { background: var(--surface-3); color: var(--text-primary); }
.ae-action.liked { color: #e05c5c; }
.ae-action.liked:hover { background: rgba(224,92,92,0.08); }

/* Primary button */
.ae-btn-primary {
  background: var(--text-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-xl);
  padding: 11px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: var(--transition);
  letter-spacing: -0.01em;
}
.ae-btn-primary:hover { background: #2d2926; box-shadow: var(--shadow-md); transform: translateY(-1px); }
.ae-btn-primary:active { transform: translateY(0); }

/* Secondary button */
.ae-btn-secondary {
  background: var(--surface);
  color: var(--text-primary);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius-xl);
  padding: 9px 20px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: var(--transition);
}
.ae-btn-secondary:hover { border-color: var(--text-primary); background: var(--surface-3); }

/* Nav items */
.ae-nav-item {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 10px 14px;
  border-radius: var(--radius-md);
  border: none;
  background: none;
  cursor: pointer;
  width: 100%;
  text-align: left;
  font-family: 'DM Sans', sans-serif;
  font-size: 14.5px;
  color: var(--text-secondary);
  font-weight: 400;
  transition: var(--transition);
  margin-bottom: 2px;
}
.ae-nav-item:hover { background: var(--surface-3); color: var(--text-primary); }
.ae-nav-item.active {
  background: linear-gradient(135deg, #f5ede0 0%, #f0e8d8 100%);
  color: var(--text-primary);
  font-weight: 600;
}
.ae-nav-item .ae-nav-icon {
  width: 20px;

// ── Install prompt ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner after 5 seconds if not installed
  setTimeout(() => {
    if (deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) {
      showInstallBanner();
    }
  }, 5000);
});

// Hide install banner when already running as PWA
if(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone){
  document.body.classList.add('pwa-mode');
}

// ── Constants ────────────────────────────────────────────────────
// ── Grades ───────────────────────────────────────────────────────
const GRADES = {
  founder:       { label: 'Fondateur',      emoji: '👑', color: '#b8860b', bg: '#fdf8e0', border: '#e8cc60' },
  early_member:  { label: 'Early Member',   emoji: '⭐', color: '#6a5acd', bg: '#f0eeff', border: '#b0a8e8' },
  premium:       { label: 'Premium',        emoji: '💎', color: '#1a7a6e', bg: '#e8f8f6', border: '#80ccc4' },
};

function getGrade(user) {
  if (user.grade && GRADES[user.grade]) return GRADES[user.grade];
  return null;
}

function GradeBadge(user, small=false) {
  // Capybara badge takes priority
  if(isCapybara(user)){
    const b=document.createElement('span');
    b.className='capy-badge';
    if(small) b.style.cssText='display:inline-flex;align-items:center;gap:2px;background:linear-gradient(135deg,#8B6537,#C49A5A);color:#fff;border-radius:99px;padding:1px 6px;font-size:9px;font-weight:700;';
    b.innerHTML='<span style="font-family:Segoe UI Emoji,Apple Color Emoji,Noto Color Emoji,sans-serif">&#129451;</span> Capybara';
    return b;
  }
  const g = getGrade(user);
  if (!g) return null;
  const badge = div({
    display:'inline-flex', alignItems:'center', gap:'3px',
    background: g.bg, border: '1px solid '+g.border,
    borderRadius: '10px', padding: small?'1px 6px':'2px 8px',
    flexShrink: 0
  });
  const em = document.createElement('span');
  em.textContent = g.emoji;
  em.style.fontSize = small ? '9px' : '11px';
  const lbl = document.createElement('span');
  lbl.textContent = g.label;
  lbl.style.cssText = "font-family:'DM Sans',sans-serif;font-size:"+(small?'8':'10')+"px;font-weight:600;color:"+g.color+";letter-spacing:0.04em;";
  badge.appendChild(em);
  badge.appendChild(lbl);
  return badge;
}

const AV_COLORS = ["#c9b99a","#a8c5b5","#b5a8c5","#c5b5a8","#a8b5c5","#c5a8b5","#b5c5a8","#2a2420","#3a5a4a","#5a3a4a","#4a3a5a"];
const initials  = n => (n||'?').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);

// ── DOM helpers ───────────────────────────────────────────────────
const el = (tag,props={},ch=[]) => {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(props)){
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html') e.innerHTML=v;
    else e[k]=v;
  }
  // ch can be array, string, or single node
  const children = Array.isArray(ch)?ch:(ch!=null?[ch]:[]);
  for(const c of children){
    if(c==null||c===false)continue;
    if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node) e.appendChild(c);
  }
  return e;
};
const div  = (s,ch)  => el('div',{style:s||{}},ch||[]);
const span = (s,t)   => { const e=el('span',{style:s||{}}); e.textContent=t||''; return e; };
const btn  = (s,t,f) => {
  const b=el('button',{style:s||{},onClick:f});
  if(typeof t==='string'){ b.textContent=t; }
  else if(Array.isArray(t)){ t.forEach(c=>{ if(c==null)return; b.appendChild(typeof c==='string'?document.createTextNode(c):c); }); }
  else if(t){ b.appendChild(t); }
  return b;
};
const p    = (s,t)   => { const e=el('p',{style:s||{}}); e.textContent=t||''; return e; };

// ── Avatar component ──────────────────────────────────────────────
function Avatar(user={},size=40){
  if(!user) user={};
  const bg = user.avatarColor||AV_COLORS[(user.uid||user.id||0).toString().charCodeAt(0)%AV_COLORS.length];

async function requestNotificationPermission() {

    const sw = await navigator.serviceWorker.getRegistration('/Aether/firebase-messaging-sw.js');
    const token = await getToken(messaging, {
      vapidKey: '9azFIDePXBG3V3kUVq-OmntSsXJEV8jqLWRrnVTIFgw',
      serviceWorkerRegistration: sw
    });
    if (token && STATE.currentUser) {
      await updateDoc(doc(db,'users',STATE.currentUser.uid),{fcmTokens:arrayUnion(token)});
    }
  } catch(e) { console.warn('FCM:', e); }
}

function setupFCMListener() {

async function signInWithGoogle() {
  try {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    // Check if profile exists
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) {
      // New user — create profile from Google data
      const handle = (user.email?.split('@')[0]||'user').toLowerCase().replace(/[^a-z0-9_]/g,'_').slice(0,20);
      await setDoc(doc(db, 'users', user.uid), {
        displayName: user.displayName || 'Utilisateur',
        handle: handle,
        bio: 'Nouveau sur Æther',
        email: user.email || '',
        photoURL: user.photoURL || null,
        followers: 0,
        following: 0,
        followingIds: [],
        avatarColor: AV_COLORS[Math.floor(Math.random()*AV_COLORS.length)],
        joinDate: new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'}),
        createdAt: serverTimestamp(),
      });
    }
    setState({authErrors: {}});
  } catch(e) {
    if(e.code !== 'auth/popup-closed-by-user') {
      setState({authErrors:{global:'Erreur Google : '+(e.message||e.code)}});
    }
  }
}

async function checkPendingNotifications(uid) {
  try {
    const snap = await getDoc(doc(db,'notifications',uid));
    if (!snap.exists()) return;
    const msgs = snap.data().unreadMessages || [];
    if (!msgs.length) return;
    const latest = msgs[msgs.length-1];
    if (Date.now() - latest.ts < 300000)
      toast('💬 Message de @'+(latest.fromHandle||latest.fromName));
    await updateDoc(doc(db,'notifications',uid),{unreadMessages:[]});
  } catch(e) {}
}

function isDesktop(){
  // Only use desktop layout for actual desktop/tablet with mouse
  // Phones in landscape orientation should stay mobile
  const hasMousePointer = window.matchMedia('(pointer:fine)').matches;
  const isWide = window.innerWidth >= 768;

// Global render lock - prevents DOM rebuild during click handlers
let _renderLocked = false;
let _pendingRender = false;

function lockRender(ms=500){
  _renderLocked = true;
  setTimeout(()=>{
    _renderLocked = false;
    if(_pendingRender){ _pendingRender=false; render(); }
  }, ms);
}

function setState(patch){
  Object.assign(STATE,patch);
  if(_renderLocked){ _pendingRender=true; return; }
  render();
}

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg,isErr=false){
  setState({toast:{msg,isErr}});
  setTimeout(()=>setState({toast:null}),3000);
}

// ── User profile cache ────────────────────────────────────────────
async function fetchUserProfile(uid){
  if(STATE.users[uid]) return STATE.users[uid];
  try{
    const snap=await getDoc(doc(db,'users',uid));
    if(snap.exists()){
      const p={uid,...snap.data()};
      STATE.users[uid]=p;
      return p;
    }
  }catch(e){}
  return {uid,displayName:'Utilisateur',handle:'?',avatarColor:'#a09890'};
}

function getUserCached(uid){
  return STATE.users[uid]||{uid,displayName:'Utilisateur',handle:'?',avatarColor:'#a09890'};
}

// ── Subscribe to posts ────────────────────────────────────────────
function subscribeToPosts(){
  if(unsubPosts) unsubPosts();
  const q=query(collection(db,'posts'),orderBy('createdAt','desc'));
  unsubPosts=onSnapshot(q,async snap=>{
    const posts=[];
    const uidsToFetch=new Set();
    snap.forEach(d=>{const p={id:d.id,...d.data()};posts.push(p);if(p.userId)uidsToFetch.add(p.userId);});
    // Fetch unknown users
    await Promise.all([...uidsToFetch].filter(uid=>!STATE.users[uid]).map(fetchUserProfile));
    STATE.posts=posts;
    STATE.postsLoading=false;
    // Don't re-render if typing or in admin tab (would break button clicks)
    const activeEl = document.activeElement;
    const isTyping = activeEl && (activeEl.tagName==='INPUT'||activeEl.tagName==='TEXTAREA');
    const inAdmin = STATE.tab === 'admin';
    if(!isTyping && !inAdmin && !_renderLocked) render();
    else if(!isTyping && !_renderLocked) render();
    else { _pendingRender = !inAdmin; STATE.postsLoading=false; }
  });
}

// Subscribe to own profile in real-time (follows, profile updates)
function subscribeToProfile(uid){
  if(unsubProfile) unsubProfile();
  unsubProfile = onSnapshot(doc(db,'users',uid), snap=>{
    if(snap.exists()){
      const profile = {uid, ...snap.data()};
      STATE.userProfile = profile;
      STATE.users[uid] = profile;
      // Keep currentUser followingIds in sync
      STATE.currentUser = {...STATE.currentUser, followingIds: profile.followingIds||[], following: profile.following||0};
      render();
    }
  });
}

          const profileData={displayName:af.name.trim(),handle,bio:(af.bio||'').trim()||'Nouveau sur Æther',email:af.email.trim(),followers:0,following:0,followingIds:[],avatarColor:AV_COLORS[Math.floor(Math.random()*AV_COLORS.length)],joinDate:new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'}),createdAt:serverTimestamp()};
          let saved=false;
          for(let i=0;i<3;i++){try{await setDoc(doc(db,'users',cred.user.uid),profileData);saved=true;break;}catch(e2){if(i<2)await new Promise(r=>setTimeout(r,1000));else throw e2;}}
          setState({authDone:true,authLoading:false});
        }catch(ex){let msg='Erreur lors de la création';if(ex.code==='auth/email-already-in-use')msg='Cet email est déjà utilisé';else if(ex.code==='auth/network-request-failed')msg='Pas de connexion réseau';else msg='Erreur : '+(ex.code||ex.message||String(ex));console.error('Firebase error:',ex);setState({authLoading:false,authErrors:{global:msg}});}

    const l2=document.createElement('div');l2.style.cssText='flex:1;height:1px;background:var(--border);';

    const gSvg2=document.createElementNS('http://www.w3.org/2000/svg','svg');

    gSvg2.innerHTML='<path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>';
    gBtn2.appendChild(gSvg2);gBtn2.appendChild(document.createTextNode('Continuer avec Google'));
    gBtn2.onclick=signInWithGoogle;card.appendChild(gBtn2);

    sw2.onclick=()=>setState({authMode:'login',authErrors:{},authForm:{}});

  root.appendChild(card);return root;
}

function renderFeed(){
  const me = STATE.userProfile||{};
  const root = document.createElement('div');
  root.style.cssText = 'padding:0;';

  // ── Compose box ──
  const compose = document.createElement('div');
  compose.style.cssText = 'background:var(--surface);border-radius:16px;padding:20px;margin-bottom:12px;overflow:hidden;';

  const composeTop = document.createElement('div');
  composeTop.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:16px;';
  composeTop.appendChild(Avatar(me,42));

  const composePlaceholder = document.createElement('div');
  composePlaceholder.style.cssText = 'flex:1;background:#f5f2ee;border-radius:24px;padding:12px 18px;cursor:text;color:#b0a898;font-size:14px;';
  composePlaceholder.textContent = 'Quoi de neuf, '+(me.displayName?.split(' ')[0]||'toi')+' ?';

  const composeTA = document.createElement('textarea');
  composeTA.style.cssText = 'flex:1;background:#f5f2ee;border:none;border-radius:16px;padding:12px 18px;font-size:14px;color:#2a2420;resize:none;outline:none;display:none;width:100%;box-sizing:border-box;font-family:inherit;';
  composeTA.rows=3; composeTA.placeholder='Quoi de neuf ?';
  composeTA.addEventListener('input',e=>{ STATE.composeText=e.target.value; });

  composePlaceholder.onclick = ()=>{

    composeTA.style.display='block';

  };
  composeTop.appendChild(composePlaceholder);
  composeTop.appendChild(composeTA);
  compose.appendChild(composeTop);

  // Media preview
  if(STATE.composeMedia){
    const prev=document.createElement('div');
    prev.style.cssText='position:relative;border-radius:12px;overflow:hidden;background:#f0ebe4;margin-bottom:14px;';
    if(STATE.composeMedia.type==='image'){
      const img=document.createElement('img');img.src=STATE.composeMedia.url;img.style.cssText='width:100%;max-height:400px;object-fit:contain;display:block;';
      prev.appendChild(img);
    } else {
      const vid=document.createElement('video');vid.src=STATE.composeMedia.url;vid.controls=true;vid.style.cssText='width:100%;max-height:400px;display:block;';
      prev.appendChild(vid);
    }
    const rm=document.createElement('button');rm.type='button';rm.textContent='✕';
    rm.style.cssText='position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;';
    rm.onclick=()=>setState({composeMedia:null});
    prev.appendChild(rm);compose.appendChild(prev);
  }

  const fileInp=document.createElement('input');fileInp.type='file';fileInp.style.display='none';
  fileInp.addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    setState({composeMedia:{file,url:URL.createObjectURL(file),type:file.type.startsWith('video/')?'video':'image'}});
    e.target.value='';
  });

  // Bottom bar
  const composeBottom=document.createElement('div');
  composeBottom.style.cssText='display:flex;align-items:center;gap:4px;padding-top:14px;border-top:1px solid #f5f2ee;';

  const mkBtn=(icon,lbl,accept)=>{
    const b=document.createElement('button');b.type='button';
    b.style.cssText='display:flex;align-items:center;gap:5px;padding:7px 12px;border:none;background:none;cursor:pointer;border-radius:8px;color:#7a7068;font-size:13px;';
    b.onmouseenter=()=>b.style.background='#f5f0ea';b.onmouseleave=()=>b.style.background='none';
    const ic=document.createElement('span');ic.textContent=icon;ic.style.cssText='font-size:15px;pointer-events:none;';
    const tx=document.createElement('span');tx.textContent=lbl;tx.style.pointerEvents='none';
    b.appendChild(ic);b.appendChild(tx);
    b.onclick=()=>{fileInp.accept=accept;fileInp.click();};return b;
  };
  composeBottom.appendChild(mkBtn('🖼','Image','image/*'));
  composeBottom.appendChild(mkBtn('▶','Vidéo','video/*'));
  composeBottom.appendChild(fileInp);
  composeBottom.appendChild(Object.assign(document.createElement('div'),{style:'flex:1'}));

  let publishing=false;
  const pubBtn=document.createElement('button');pubBtn.type='button';pubBtn.textContent='Publier';
  pubBtn.style.cssText='background:#1a1a1a;color:#fff;border:none;padding:9px 22px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;';
  pubBtn.onclick=async()=>{
    if(publishing)return;
    const txt=(STATE.composeText||composeTA.value||'').trim();
    const med=STATE.composeMedia;
    if(!txt&&!med)return;
    publishing=true;pubBtn.style.opacity='0.6';pubBtn.textContent='…';
    try{
      let mediaData=null;
      if(med?.file){
        pubBtn.textContent='Upload…';
        if(med.type==='video'){mediaData=await uploadToCloudinary(med.file);}
        else{
          const b64=await new Promise((res,rej)=>{
            const img=new Image();
            img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;const MAX=900;if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.8));};
            img.onerror=rej;img.src=URL.createObjectURL(med.file);
          });
          mediaData={url:b64,type:'image'};
        }
      }
      await addDoc(collection(db,'posts'),{userId:STATE.currentUser.uid,content:txt||'',media:mediaData,likes:0,likedBy:[],comments:[],createdAt:serverTimestamp()});
      STATE.composeText='';STATE.composeMedia=null;
      composeTA.value='';composeTA.style.display='none';composePlaceholder.style.display='block';
      toast('Publication envoyée !');
    }catch(e){toast('Erreur',true);console.error(e);}
    publishing=false;pubBtn.style.opacity='1';pubBtn.textContent='Publier';
  };
  composeBottom.appendChild(pubBtn);
  compose.appendChild(composeBottom);
  root.appendChild(compose);

  if(STATE.postsLoading){root.appendChild(Spinner());return root;}

  // ── Posts ──
  STATE.posts.forEach(post=>{
    const u=getUserCached(post.userId)||{};
    const liked=(post.likedBy||[]).includes(STATE.currentUser.uid);
    const showC=STATE.openComments[post.id];

    const card=document.createElement('div');
    card.style.cssText='background:var(--surface);border-radius:16px;padding:20px;margin-bottom:12px;overflow:hidden;min-width:0;';

    // Header
    const ph=document.createElement('div');ph.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:14px;';
    const avEl=Avatar(u,42);avEl.style.cursor='pointer';avEl.onclick=()=>setState({profileUid:post.userId,tab:'profile'});
    ph.appendChild(avEl);
    const pInfo=document.createElement('div');pInfo.style.flex='1';pInfo.style.minWidth='0';
    const pNameRow=document.createElement('div');pNameRow.style.cssText='display:flex;align-items:center;gap:6px;flex-wrap:wrap;';
    const pn=document.createElement('span');pn.style.cssText='font-size:14px;font-weight:700;color:#1a1a1a;cursor:pointer;';pn.textContent=u.displayName||'';
    pn.onclick=()=>setState({profileUid:post.userId,tab:'profile'});
    pNameRow.appendChild(pn);
    const pgb=GradeBadge(u,true);if(pgb)pNameRow.appendChild(pgb);
    const pSub=document.createElement('div');pSub.style.cssText='font-size:12px;color:#a09890;margin-top:2px;';
    let timeStr='';if(post.createdAt?.toDate){const d=post.createdAt.toDate(),diff=Date.now()-d.getTime();if(diff<3600000)timeStr='il y a '+Math.floor(diff/60000)+'min';else if(diff<86400000)timeStr='il y a '+Math.floor(diff/3600000)+'h';else timeStr='il y a '+Math.floor(diff/86400000)+'j';}
    pSub.textContent='@'+(u.handle||'')+(timeStr?' · '+timeStr:'');
    pInfo.appendChild(pNameRow);pInfo.appendChild(pSub);ph.appendChild(pInfo);
    const mb=document.createElement('button');mb.type='button';mb.textContent='···';
    mb.style.cssText='background:none;border:none;cursor:pointer;font-size:18px;color:#a09890;padding:4px 8px;border-radius:8px;letter-spacing:1px;position:relative;';
    // Dropdown menu
    mb.onclick=(e)=>{
      e.stopPropagation();
      document.querySelectorAll('.post-menu').forEach(m=>m.remove());
      const menu=document.createElement('div');menu.className='post-menu';
      menu.style.cssText='position:absolute;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:100;min-width:160px;overflow:hidden;';
      if(post.userId===STATE.currentUser.uid){
        const del=document.createElement('button');del.type='button';del.textContent='🗑 Supprimer';
        del.style.cssText='width:100%;padding:11px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:#c0392b;text-align:left;font-family:"DM Sans",sans-serif;';
        del.onmouseenter=()=>del.style.background='#fff0f0';del.onmouseleave=()=>del.style.background='none';
        del.onclick=async()=>{menu.remove();if(confirm('Supprimer ce post ?'))try{await deleteDoc(doc(db,'posts',post.id));}catch(er){console.error(er);}};
        menu.appendChild(del);
      } else {
        const rep=document.createElement('button');rep.type='button';rep.textContent='🚨 Signaler';
        rep.style.cssText='width:100%;padding:11px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:#c0392b;text-align:left;font-family:"DM Sans",sans-serif;';
        rep.onmouseenter=()=>rep.style.background='#fff0f0';rep.onmouseleave=()=>rep.style.background='none';
        rep.onclick=()=>{ menu.remove(); showReportModal(post.id); };
        menu.appendChild(rep);
      }
      // Share
      const share=document.createElement('button');share.type='button';share.textContent='↗ Partager';
      share.style.cssText='width:100%;padding:11px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text-primary);text-align:left;font-family:"DM Sans",sans-serif;';
      share.onmouseenter=()=>share.style.background='var(--surface-3)';share.onmouseleave=()=>share.style.background='none';
      share.onclick=()=>{menu.remove();if(navigator.share)navigator.share({text:post.content||'',url:window.location.href}).catch(()=>{});};
      menu.appendChild(share);
      mb.style.position='relative';mb.appendChild(menu);
      // Close on outside click
      setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),0);
    };
    ph.appendChild(mb);
    card.appendChild(ph);

    // Capybara certification badge
    if(post.capybaraCertified){
      const cert=document.createElement('div');
      cert.className='capy-cert';
      cert.style.cssText='display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#fdf3e3,#f5e0b5);border:1px solid #C49A5A;border-radius:99px;padding:4px 12px;font-size:11px;font-weight:700;color:#8B6537;margin-bottom:10px;';
      cert.innerHTML='<span style="font-family:Segoe UI Emoji,Apple Color Emoji,Noto Color Emoji,sans-serif">&#129451;</span> Approuvé par Capybara';
      card.appendChild(cert);
    }

    // Content
    if(post.content){
      const pc=document.createElement('p');
      pc.style.cssText="font-family:'Lora',serif;font-size:15px;color:#2a2420;line-height:1.7;margin:0 0 14px;white-space:pre-wrap;";
      pc.textContent=post.content;card.appendChild(pc);
    }

    // Media
    if(post.media?.url){
      const mw=document.createElement('div');mw.style.cssText='border-radius:12px;overflow:hidden;margin-bottom:14px;background:var(--surface-3);';
      if(post.media.type==='image'){
        const img=document.createElement('img');img.src=post.media.url;img.loading='lazy';
        img.style.cssText='width:100%;max-height:560px;object-fit:contain;display:block;';mw.appendChild(img);
      }else{
        const vid=document.createElement('video');
        vid.src=post.media.url;vid.playsInline=true;vid.muted=true;vid.loop=true;
        vid.controls=true;

          entries.forEach(e=>{
            if(e.isIntersecting){
              // Pause all other feed videos first
              document.querySelectorAll('video.feed-vid').forEach(v=>{if(v!==vid){v.pause();}});
              vid.play().catch(()=>{});
            } else {
              vid.pause();
            }
          });
        },{threshold:0.6});
        vid.className='feed-vid';

        mw.appendChild(vid);

    actions.appendChild(mkAct(liked?'♥':'♡',post.likes||0,liked,async()=>{
      const ref=doc(db,'posts',post.id);

        else {
          await updateDoc(ref,{likes:increment(1),likedBy:arrayUnion(STATE.currentUser.uid)});
          // If current user is capybara, mark post as capybara-certified
          if(isCapybara(STATE.userProfile)){
            await updateDoc(ref,{capybaraCertified:true});
            // Add visual certification immediately
            if(card) addCapybaraCertification(card);

            toast('🦫 Certification Capybara accordée !');

      }catch(e){console.error(e);}

    const sp=document.createElement('div');sp.style.flex='1';actions.appendChild(sp);
    const bm=document.createElement('button');bm.type='button';bm.textContent='🔖';
    bm.style.cssText='background:none;border:none;cursor:pointer;font-size:16px;color:#a09890;padding:7px;border-radius:10px;';
    bm.onmouseenter=()=>bm.style.background='#f5f0ea';bm.onmouseleave=()=>bm.style.background='none';
    actions.appendChild(bm);card.appendChild(actions);

    // Comments
    if(showC){
      const cSec=document.createElement('div');cSec.style.cssText='margin-top:14px;padding-top:14px;border-top:1px solid #f5f2ee;';
      (post.comments||[]).forEach(c=>{
        const cu=getUserCached(c.userId)||{};
        const cd=document.createElement('div');cd.style.cssText='display:flex;gap:10px;margin-bottom:10px;';
        cd.appendChild(Avatar(cu,30));
        const cb=document.createElement('div');cb.style.cssText='background:#f5f2ee;border-radius:12px;padding:8px 12px;flex:1;';
        const cn=document.createElement('span');cn.style.cssText='font-size:12px;font-weight:700;color:#1a1a1a;';cn.textContent=(cu.handle?'@'+cu.handle:cu.displayName||'?')+' ';
        const ct=document.createElement('span');ct.style.cssText="font-family:'Lora',serif;font-size:13px;color:var(--text-secondary);word-break:break-word;overflow-wrap:break-word;";ct.textContent=c.text;
        cb.appendChild(cn);cb.appendChild(ct);cd.appendChild(cb);cSec.appendChild(cd);
      });
      const ci=document.createElement('div');ci.style.cssText='display:flex;gap:10px;align-items:center;';
      ci.appendChild(Avatar(me,30));
      const cinp=document.createElement('input');cinp.type='text';cinp.placeholder='Écrire un commentaire…';
      cinp.value=STATE.commentTexts[post.id]||'';
      cinp.style.cssText='flex:1;background:#f5f2ee;border:none;border-radius:20px;padding:10px 16px;font-size:13px;color:#2a2420;outline:none;';
      cinp.addEventListener('input',e=>{STATE.commentTexts[post.id]=e.target.value;});
      const sendC=async()=>{const t=(STATE.commentTexts[post.id]||cinp.value||'').trim();if(!t)return;try{await updateDoc(doc(db,'posts',post.id),{comments:arrayUnion({userId:STATE.currentUser.uid,text:t,createdAt:new Date().toISOString()})});STATE.commentTexts[post.id]='';cinp.value='';}catch(e){console.error(e);}};
      cinp.addEventListener('keydown',e=>{if(e.key==='Enter')sendC();});
      const sb=document.createElement('button');sb.type='button';sb.textContent='↵';
      sb.style.cssText='background:#1a1a1a;color:#fff;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;flex-shrink:0;';
      sb.onclick=sendC;ci.appendChild(cinp);ci.appendChild(sb);cSec.appendChild(ci);
      card.appendChild(cSec);
    }
    root.appendChild(card);
  });
  return root;
}

// ── Video helpers ─────────────────────────────────────────────────
function getVideoFeed(){
  const q=(STATE.videoSearch||'').toLowerCase().trim();
  return STATE.posts.filter(p=>{
    if(p.media?.type!=='video') return false;
    if(!q) return true;
    const u=getUserCached(p.userId)||{};
    return (p.content||'').toLowerCase().includes(q)||(u.handle||'').toLowerCase().includes(q)||(u.displayName||'').toLowerCase().includes(q);
  });
}

function renderVideos(){
  const allVids = getVideoFeed();
  const curIdx = STATE.videoIndex||0;
  const showSearch = STATE.videoSearchOpen||false;
  const me = STATE.userProfile||{};

  // Container
  const maxH = isDesktop() ? 'calc(100vh - 57px)' : 'calc(100dvh - 120px)';
  const root = div({
    position:'relative',
    background: isDesktop() ? 'var(--bg)' : '#0a0a0a',
    height: maxH,
    minHeight: '400px',
    overflow:'hidden', userSelect:'none',
    display:'flex', alignItems:'center', justifyContent:'center'
  });

  // Empty state
  if(!allVids.length){
    root.style.background='#faf7f3';
    root.appendChild(div({display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:'14px'},[
      el('div',{style:{fontSize:'40px',opacity:'0.3'}},'▶'),
      p({fontFamily:"'Lora',serif",fontSize:'14px',color:'#a09890',fontStyle:'italic',textAlign:'center'},"Aucune vidéo pour l'instant."),

  }

  // Clamp index
  const idx = Math.max(0, Math.min(curIdx, allVids.length-1));
  const post = allVids[idx];
  const u = getUserCached(post.userId)||{};

  const showComments = STATE.videoShowComments===post.id;

    background: '#000',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',

  const vid = el('video',{

      objectFit: isDesktop() ? 'contain' : 'cover',
      display:'block',
      background:'#000'
    }
  });

  vid.setAttribute('webkit-playsinline','');

  vidContainer.appendChild(vid);

  // On desktop, add video to a centered container
  if(isDesktop()){
    const vidWrap = div({
      display:'flex', alignItems:'center', justifyContent:'center', height:'100%',

    vidWrap.appendChild(vidContainer);

    // Right info panel for desktop — light themed
    const rightPanel = div({
      width:'300px', flexShrink:0, display:'flex', flexDirection:'column',
      justifyContent:'flex-end', paddingBottom:'24px', gap:'20px',
      background:'transparent'
    });

    // Author info
    const authorRow = div({display:'flex',alignItems:'center',gap:'10px',cursor:'pointer'});
    authorRow.appendChild(Avatar(u,44));
    const authorInfo = div({});
    const aName=div({display:'flex',alignItems:'center',gap:'6px'});
    aName.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'15px',fontWeight:700,color:'var(--text-primary)'}},u.displayName||''));
    const agb=GradeBadge(u,true); if(agb) aName.appendChild(agb);
    authorInfo.appendChild(aName);
    authorInfo.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'rgba(255,255,255,0.6)'}},'@'+(u.handle||''),{color:'var(--text-muted)'}));
    authorRow.appendChild(authorInfo);
    authorRow.addEventListener('click',()=>setState({profileUid:post.userId,tab:'profile'}));
    rightPanel.appendChild(authorRow);

    // Description
    if(post.content){
      const desc=document.createElement('p');
      desc.style.cssText="font-family:'Lora',serif;font-size:14px;color:var(--text-secondary);margin:0;line-height:1.6;";
      desc.textContent=post.content;
      rightPanel.appendChild(desc);
    }

    // Action buttons (desktop style — horizontal)
    const deskActions=div({display:'flex',gap:'16px',alignItems:'center'});

    // Like
    const dLikeBtn=div({display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',padding:'8px 16px',background:'var(--surface-3)',borderRadius:'20px',border:'1px solid var(--border)'});
    dLikeBtn.appendChild(el('span',{style:{fontSize:'18px',color:liked?'#e05c5c':'var(--text-muted)'}},liked?'♥':'♡'));
    dLikeBtn.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'13px',color:'var(--text-primary)',fontWeight:600}},String(post.likes||0)));
    dLikeBtn.addEventListener('click',async()=>{
      const ref=doc(db,'posts',post.id);
      try{
        if(liked) await updateDoc(ref,{likes:increment(-1),likedBy:arrayRemove(STATE.currentUser.uid)});
        else await updateDoc(ref,{likes:increment(1),likedBy:arrayUnion(STATE.currentUser.uid)});
      }catch(e){console.error(e);}
    });
    deskActions.appendChild(dLikeBtn);

    // Comment
    const dCmtBtn=div({display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',padding:'8px 16px',background:'var(--surface-3)',borderRadius:'20px',border:'1px solid var(--border)'});
    dCmtBtn.appendChild(el('span',{style:{fontSize:'16px',color:'var(--text-muted)'}},'💬'));
    dCmtBtn.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'13px',color:'var(--text-primary)',fontWeight:600}},String((post.comments||[]).length)));
    dCmtBtn.addEventListener('click',()=>{STATE.videoShowComments=showComments?null:post.id;render();});
    deskActions.appendChild(dCmtBtn);

    // Mute
    const dMuteBtn=div({cursor:'pointer',padding:'8px 14px',background:'var(--surface-3)',borderRadius:'20px',fontSize:'16px',color:'var(--text-primary)',border:'1px solid var(--border)'},STATE.videoMuted!==false?['🔇']:['🔊']);
    dMuteBtn.addEventListener('click',()=>{STATE.videoMuted=STATE.videoMuted===false?true:false;render();});
    deskActions.appendChild(dMuteBtn);

    rightPanel.appendChild(deskActions);

    // Comments section (desktop - inline below buttons)
    if(showComments){
      const dCmtSection=div({background:'rgba(255,255,255,0.05)',borderRadius:'12px',padding:'14px',maxHeight:'260px',display:'flex',flexDirection:'column'});
      dCmtSection.appendChild(el('div',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'12px',fontWeight:600,color:'rgba(255,255,255,0.6)',marginBottom:'10px'}},String((post.comments||[]).length)+' commentaire'+(post.comments?.length!==1?'s':'')));
      const cList=div({flex:1,overflowY:'auto',marginBottom:'10px'});
      (post.comments||[]).forEach(c=>{
        const cu=getUserCached(c.userId)||{};
        const cd=div({display:'flex',gap:'8px',marginBottom:'8px'});
        cd.appendChild(Avatar(cu,24));
        const ct=div({});
        ct.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'11px',fontWeight:600,color:'rgba(255,255,255,0.8)'}},(cu.handle?'@'+cu.handle:cu.displayName||'?')+' '));
        ct.appendChild(el('span',{style:{fontFamily:"'Lora',serif",fontSize:'12px',color:'rgba(245,240,234,0.7)'}},c.text));
        cd.appendChild(ct);
        cList.appendChild(cd);
      });
      if(!(post.comments||[]).length) cList.appendChild(p({fontFamily:"'Lora',serif",fontSize:'12px',color:'rgba(255,255,255,0.3)',fontStyle:'italic'},'Aucun commentaire.'));
      dCmtSection.appendChild(cList);
      const dci=div({display:'flex',gap:'8px'});
      const dcinp=el('input',{type:'text',placeholder:'Commenter...',value:STATE.videoCommentText||'',style:{flex:1,background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'16px',padding:'6px 12px',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#fff',outline:'none'}});
      dcinp.addEventListener('input',e=>{STATE.videoCommentText=e.target.value;});
      const dsendC=async()=>{
        const t=STATE.videoCommentText?.trim(); if(!t)return;
        try{ await updateDoc(doc(db,'posts',post.id),{comments:arrayUnion({userId:STATE.currentUser.uid,text:t,createdAt:new Date().toISOString()})}); STATE.videoCommentText=''; }catch(e){console.error(e);}
      };
      dcinp.addEventListener('keydown',e=>{if(e.key==='Enter')dsendC();});
      dci.appendChild(dcinp);
      dci.appendChild(btn({background:'#c17a4a',border:'none',borderRadius:'50%',width:'28px',height:'28px',cursor:'pointer',color:'#fff',fontSize:'13px',flexShrink:0},'↑',dsendC));
      dCmtSection.appendChild(dci);
      rightPanel.appendChild(dCmtSection);
    }

    // Nav arrows
    const navRow=div({display:'flex',gap:'12px',alignItems:'center',justifyContent:'center'});
    if(idx>0){
      const pb=div({cursor:'pointer',padding:'8px 20px',background:'var(--surface-3)',borderRadius:'20px',color:'var(--text-primary)',fontFamily:"'DM Sans',sans-serif",fontSize:'13px',userSelect:'none',border:'1px solid var(--border)'},['↑ Précédente']);
      pb.addEventListener('click',()=>setState({videoIndex:idx-1,videoShowComments:null}));
      navRow.appendChild(pb);
    }
    if(idx<allVids.length-1){
      const nb=div({cursor:'pointer',padding:'8px 20px',background:'var(--surface-3)',borderRadius:'20px',color:'var(--text-primary)',fontFamily:"'DM Sans',sans-serif",fontSize:'13px',userSelect:'none',border:'1px solid var(--border)'},['↓ Suivante']);
      nb.addEventListener('click',()=>setState({videoIndex:idx+1,videoShowComments:null}));
      navRow.appendChild(nb);
    }
    rightPanel.appendChild(navRow);

    // Counter
    rightPanel.appendChild(el('div',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'11px',color:'var(--text-muted)',textAlign:'center'}},String(idx+1)+' / '+String(allVids.length)));

    vidWrap.appendChild(rightPanel);
    root.appendChild(vidWrap);
  } else {
    root.appendChild(vidContainer);
  }

  // Play/pause on tap (center area)
  let tapTimer;
  vid.addEventListener('click',()=>{
    if(vid.paused) vid.play(); else vid.pause();
    // Show brief pause icon
    const pi=div({position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'rgba(0,0,0,0.4)',borderRadius:'50%',width:'56px',height:'56px',display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',zIndex:5},[
      el('span',{style:{color:'#fff',fontSize:'22px',marginLeft:vid.paused?'3px':'0'}},vid.paused?'▶':'⏸')
    ]);
    root.appendChild(pi);
    clearTimeout(tapTimer);
    tapTimer=setTimeout(()=>pi.remove(),700);
  });

  // On mobile only: add overlays to root (they position:absolute over the video)
  if(!isDesktop()){
  // ── Gradient overlay ──
  root.appendChild(div({
    position:'absolute', inset:'0', pointerEvents:'none',
    background:'linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 30%, transparent 55%, rgba(0,0,0,0.75) 100%)'
  }));

  // ── Right action buttons ──
  const actions = div({
    position:'absolute', right:'12px', bottom: showComments?'320px':'80px',
    display:'flex', flexDirection:'column', alignItems:'center', gap:'16px', zIndex:10,
    transition:'bottom 0.3s ease'
  });

  // Avatar
  const avWrap = div({position:'relative', marginBottom:'4px'});
  avWrap.appendChild(Avatar(u, 40));
  avWrap.addEventListener('click',()=>setState({profileUid:post.userId,tab:'profile'}));
  actions.appendChild(avWrap);

  // Like
  const likeWrap = div({display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',cursor:'pointer'});
  const likeIcon = div({width:'44px',height:'44px',borderRadius:'50%',background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px',transition:'transform 0.15s'},[liked?'♥':'♡']);
  likeIcon.style.color = liked?'#ff4d6d':'#fff';
  likeWrap.appendChild(likeIcon);
  likeWrap.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#fff',fontWeight:600}},String(post.likes||0)));
  likeWrap.addEventListener('click',async()=>{
    const ref=doc(db,'posts',post.id);
    try{
      if(liked){
        await updateDoc(ref,{likes:increment(-1),likedBy:arrayRemove(STATE.currentUser.uid)});
      }else{
        await updateDoc(ref,{likes:increment(1),likedBy:arrayUnion(STATE.currentUser.uid)});
        likeIcon.style.transform='scale(1.3)';
        setTimeout(()=>likeIcon.style.transform='scale(1)',200);
      }
    }catch(e){console.error(e);}
  });
  actions.appendChild(likeWrap);

  // Comment
  const cmtWrap = div({display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',cursor:'pointer'});
  cmtWrap.appendChild(div({width:'44px',height:'44px',borderRadius:'50%',background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',color:'#fff'},['◯']));
  cmtWrap.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#fff',fontWeight:600}},String((post.comments||[]).length)));
  cmtWrap.addEventListener('click',()=>{ STATE.videoShowComments=showComments?null:post.id; render(); });
  actions.appendChild(cmtWrap);

  // Mute
  const muteWrap = div({width:'44px',height:'44px',borderRadius:'50%',background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',color:'#fff',cursor:'pointer'},[STATE.videoMuted!==false?'🔇':'🔊']);
  muteWrap.addEventListener('click',()=>{ STATE.videoMuted=STATE.videoMuted===false?true:false; render(); });
  actions.appendChild(muteWrap);

  root.appendChild(actions);

  // ── Bottom info ──
  const info = div({
    position:'absolute', bottom: showComments?'320px':'16px', left:'12px', right:'64px',
    zIndex:10, transition:'bottom 0.3s ease'
  });
  const infoName=div({display:'flex',alignItems:'center',gap:'6px',marginBottom:'4px'});
  infoName.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'14px',fontWeight:700,color:'#fff'}},u.displayName||''));
  infoName.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'rgba(255,255,255,0.7)'}},'@'+(u.handle||'')));
  const igb=GradeBadge(u,true); if(igb) infoName.appendChild(igb);
  info.appendChild(infoName);
  if(post.content){
    const ct=document.createElement('p');
    ct.style.cssText="font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,0.9);margin:0;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;";
    ct.textContent=post.content;
    info.appendChild(ct);
  }
  root.appendChild(info);

  // ── Navigation arrows (desktop) / swipe (mobile) ──
  if(idx>0){
    const prevBtn=div({position:'absolute',top:'50%',left:'12px',transform:'translateY(-50%)',background:'rgba(0,0,0,0.4)',borderRadius:'50%',width:'40px',height:'40px',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',zIndex:10,color:'#fff',fontSize:'20px',userSelect:'none'},['‹']);
    prevBtn.addEventListener('click',()=>setState({videoIndex:idx-1,videoShowComments:null}));
    root.appendChild(prevBtn);
  }
  if(idx<allVids.length-1){
    const nextBtn=div({position:'absolute',bottom:'80px',right:'12px',display:'none'});// hidden, use swipe

    const upArrow=div({position:'absolute',top:'16px',left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,0.5)',fontSize:'20px',zIndex:10,pointerEvents:'none'},['∧']);
    root.appendChild(upArrow);
  }

  // Counter
  root.appendChild(div({
    position:'absolute',top:'12px',left:'50%',transform:'translateX(-50%)',
    background:'rgba(0,0,0,0.4)',borderRadius:'12px',padding:'3px 10px',zIndex:10,
    fontFamily:"'DM Sans',sans-serif",fontSize:'11px',color:'rgba(255,255,255,0.8)'
  },[String(idx+1)+' / '+String(allVids.length)]));

  } // end if(!isDesktop()) mobile overlays

  // ── Swipe / scroll navigation ──
  let touchStartY=0, touchStartX=0;
  root.addEventListener('touchstart',e=>{ touchStartY=e.touches[0].clientY; touchStartX=e.touches[0].clientX; },{passive:true});
  root.addEventListener('touchend',e=>{
    const dy=touchStartY-e.changedTouches[0].clientY;
    const dx=Math.abs(touchStartX-e.changedTouches[0].clientX);
    if(Math.abs(dy)>50&&dx<60){
      if(dy>0&&idx<allVids.length-1) setState({videoIndex:idx+1,videoShowComments:null});
      else if(dy<0&&idx>0) setState({videoIndex:idx-1,videoShowComments:null});
    }
  },{passive:true});

  // Keyboard navigation
  const keyHandler=e=>{
    if(e.key==='ArrowDown'&&idx<allVids.length-1) setState({videoIndex:idx+1,videoShowComments:null});
    else if(e.key==='ArrowUp'&&idx>0) setState({videoIndex:idx-1,videoShowComments:null});
    else if(e.key===' '){e.preventDefault();if(vid.paused)vid.play();else vid.pause();}
  };
  document.addEventListener('keydown',keyHandler);
  // Cleanup on tab change
  const origRender=window._videoKeyCleanup;
  if(origRender) origRender();
  window._videoKeyCleanup=()=>document.removeEventListener('keydown',keyHandler);

  // Mouse wheel navigation
  root.addEventListener('wheel',e=>{
    e.preventDefault();
    if(e.deltaY>40&&idx<allVids.length-1) setState({videoIndex:idx+1,videoShowComments:null});
    else if(e.deltaY<-40&&idx>0) setState({videoIndex:idx-1,videoShowComments:null});
  },{passive:false});

  // ── Comments panel ──
  if(showComments){
    const panel=div({
      position:'absolute',bottom:'0',left:'0',right:'0',height:'310px',
      background:'rgba(20,16,12,0.96)',borderRadius:'20px 20px 0 0',
      zIndex:20,display:'flex',flexDirection:'column',
      animation:'slideUp 0.25s ease'
    });
    const ph=div({padding:'14px 16px 10px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid rgba(255,255,255,0.1)',flexShrink:0});
    ph.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'14px',fontWeight:600,color:'#f5f0ea'}},String((post.comments||[]).length)+' commentaire'+(post.comments?.length!==1?'s':'')));
    ph.appendChild(btn({background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.5)',fontSize:'20px',padding:'0'},'✕',()=>{STATE.videoShowComments=null;render();}));
    panel.appendChild(ph);

    const cList=div({flex:1,overflowY:'auto',padding:'10px 16px'});
    (post.comments||[]).forEach(c=>{
      const cu=getUserCached(c.userId)||{};
      const cd=div({display:'flex',gap:'8px',marginBottom:'12px'});
      cd.appendChild(Avatar(cu,28));
      const ct=div({});
      ct.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'12px',fontWeight:600,color:'#f5f0ea'}},(cu.handle?'@'+cu.handle:cu.displayName||'?')+' '));
      ct.appendChild(el('span',{style:{fontFamily:"'Lora',serif",fontSize:'13px',color:'rgba(245,240,234,0.85)'}},c.text));
      cd.appendChild(ct);
      cList.appendChild(cd);
    });
    if(!(post.comments||[]).length){
      cList.appendChild(p({fontFamily:"'Lora',serif",fontSize:'13px',color:'rgba(255,255,255,0.4)',fontStyle:'italic',textAlign:'center',paddingTop:'20px'},'Aucun commentaire.'));
    }
    panel.appendChild(cList);

    const ci=div({padding:'10px 16px',borderTop:'1px solid rgba(255,255,255,0.1)',display:'flex',gap:'8px',flexShrink:0});
    const cinp=el('input',{type:'text',placeholder:'Ajouter un commentaire...',value:STATE.videoCommentText||'',style:{flex:1,background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'20px',padding:'8px 14px',fontFamily:"'DM Sans',sans-serif",fontSize:'13px',color:'#f5f0ea',outline:'none'}});
    cinp.addEventListener('input',e=>{STATE.videoCommentText=e.target.value;});
    const sendC=async()=>{
      const t=STATE.videoCommentText?.trim(); if(!t)return;
      const nc={userId:STATE.currentUser.uid,text:t,createdAt:new Date().toISOString()};
      try{
        await updateDoc(doc(db,'posts',post.id),{comments:arrayUnion(nc)});
        STATE.videoCommentText='';
      }catch(e){console.error(e);}
    };
    cinp.addEventListener('keydown',e=>{if(e.key==='Enter')sendC();});
    ci.appendChild(cinp);
    ci.appendChild(btn({background:'#c17a4a',border:'none',borderRadius:'50%',width:'34px',height:'34px',cursor:'pointer',color:'#fff',fontSize:'14px',flexShrink:0},'↑',sendC));
    panel.appendChild(ci);
    root.appendChild(panel);
    setTimeout(()=>cList.scrollTop=cList.scrollHeight,30);
  }

  // ── Search bar (collapsible) ──
  if(STATE.videoSearchOpen){
    const searchBar=div({position:'absolute',top:'0',left:'0',right:'0',background:'rgba(0,0,0,0.7)',padding:'10px 16px',display:'flex',alignItems:'center',gap:'8px',zIndex:30});

function renderExplore(){
  const me = STATE.userProfile||{};
  const q=(STATE.exploreSearch||'').toLowerCase().trim();
  const allUsers=Object.values(STATE.users).filter(u=>{
    if(u.uid===STATE.currentUser?.uid||!u.handle)return false;

  });

  const root=document.createElement('div');root.style.cssText='background:#f0ebe3;min-height:100%;';

  const hd=document.createElement('div');hd.style.cssText='background:#fff;padding:18px 20px 14px;border-bottom:1px solid #f5f2ee;';

  const sw=document.createElement('div');sw.style.cssText='display:flex;align-items:center;gap:10px;background:#f5f2ee;border-radius:22px;padding:10px 18px;';

  sw.appendChild(si);sw.appendChild(sinp);
  if(STATE.exploreSearch){const clr=document.createElement('button');clr.type='button';clr.textContent='✕';clr.style.cssText='background:none;border:none;cursor:pointer;font-size:14px;color:#a09890;';clr.onclick=()=>{STATE.exploreSearch='';sinp.value='';filterExplore(null,list,me);};sw.appendChild(clr);}

    getDocs(collection(db,'users')).then(snap=>{snap.forEach(d=>{if(d.id!==STATE.currentUser?.uid)STATE.users[d.id]={uid:d.id,...d.data()};});filterExplore(null,list,me);}).catch(()=>{});

function filterExplore(root,list,me){
  const q=(STATE.exploreSearch||'').toLowerCase().trim();
  const allUsers=Object.values(STATE.users).filter(u=>{
    if(u.uid===STATE.currentUser?.uid||!u.handle)return false;
    if(!q)return true;
    return (u.handle||'').toLowerCase().includes(q)||(u.displayName||'').toLowerCase().includes(q);
  });
  list.innerHTML='';buildExploreList(list,me,allUsers,q);
}

    else{info.appendChild(nh);info.appendChild(hs);}
    row.appendChild(info);
    const fb=document.createElement('button');fb.type='button';fb.textContent=followed?'Abonné':'Suivre';
    fb.style.cssText='background:'+(followed?'#1a1a1a':'#fff')+';color:'+(followed?'#fff':'#1a1a1a')+';border:1.5px solid '+(followed?'#1a1a1a':'#d5cfc8')+';padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;white-space:nowrap;';
    fb.onclick=async()=>{
      const myRef=doc(db,'users',STATE.currentUser.uid);const thRef=doc(db,'users',u.uid);
      try{
        if(followed){await updateDoc(myRef,{following:increment(-1),followingIds:arrayRemove(u.uid)});await updateDoc(thRef,{followers:increment(-1)});}
        else{await updateDoc(myRef,{following:increment(1),followingIds:arrayUnion(u.uid)});await updateDoc(thRef,{followers:increment(1)});}
        const ts=await getDoc(thRef);if(ts.exists())STATE.users[u.uid]={uid:u.uid,...ts.data()};render();
      }catch(e){console.error(e);}
    };
    row.appendChild(fb);list.appendChild(row);
  });
}

// ── Messaging helpers ─────────────────────────────────────────────
function convKey(uid1, uid2) {
  return [uid1, uid2].sort().join('_');
}

function getMutualFollows() {
  const me = STATE.userProfile || {};
  const myFollowing = me.followingIds || [];
  const iAmAdmin = me.isAdmin || me.isSuperAdmin;
  return Object.values(STATE.users).filter(u => {
    if (u.uid === STATE.currentUser?.uid) return false;
    if (!u.handle) return false;
    const theyFollowMe = (u.followingIds || []).includes(STATE.currentUser?.uid);
    const iFollowThem = myFollowing.includes(u.uid);
    if (iAmAdmin) return iFollowThem || theyFollowMe;
    if (u.isAdmin || u.isSuperAdmin) return iFollowThem && theyFollowMe;
    return theyFollowMe && iFollowThem;
  });
}

function subscribeToConv(uid) {
  if (unsubConv) { unsubConv(); unsubConv = null; }
  const key = convKey(STATE.currentUser.uid, uid);
  const convRef = doc(db, 'conversations', key);
  unsubConv = onSnapshot(convRef, snap => {
    if (snap.exists()) {
      STATE.msgConvs[key] = snap.data();
    } else {
      STATE.msgConvs[key] = { messages: [] };
    }
    const msgsList = document.getElementById('conv-messages');
    if (msgsList) updateMessagesList(msgsList, uid);
  });
}

function getConvMessages(uid) {
  const key = convKey(STATE.currentUser.uid, uid);
  return (STATE.msgConvs[key] || { messages: [] }).messages || [];
}

function updateMessagesList(container, uid) {
  const messages = getConvMessages(uid);
  const key = convKey(STATE.currentUser.uid, uid);
  const prevCount = container.dataset ? (parseInt(container.dataset.msgCount)||0) : 0;
  const newCount = messages.length;
  if(container.dataset) container.dataset.msgCount = String(newCount);
  container.innerHTML = '';
  if (!messages.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;padding:40px 0;';
    const ic=document.createElement('div');ic.textContent='✉';ic.style.cssText='font-size:32px;opacity:0.25;';
    const tx=document.createElement('p');tx.textContent='Commencez la conversation';tx.style.cssText="font-family:'Lora',serif;font-size:14px;color:#b0a898;font-style:italic;";
    empty.appendChild(ic);empty.appendChild(tx);container.appendChild(empty);return;
  }
  messages.forEach((m, idx) => {
    const isMe = m.senderId === STATE.currentUser.uid;
    const mb = document.createElement('div');
    mb.style.cssText = 'display:flex;justify-content:'+(isMe?'flex-end':'flex-start')+';align-items:flex-end;gap:6px;';
    const ts = m.ts ? new Date(m.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
    const bw = document.createElement('div'); bw.style.maxWidth='72%';
    const bubble = document.createElement('div');
    bubble.style.cssText = 'padding:10px 14px;border-radius:'+(isMe?'18px 18px 4px 18px':'18px 18px 18px 4px')+';background:'+(isMe?'#1a1a1a':'#fff')+';font-size:14px;line-height:1.6;color:'+(isMe?'#fff':'#1a1a1a')+';box-shadow:0 1px 4px rgba(0,0,0,0.06);';
    bubble.textContent = m.text;
    const timeEl = document.createElement('div');
    timeEl.style.cssText = 'font-size:10px;color:'+(isMe?'rgba(255,255,255,0.5)':'#b0a898')+';margin-top:3px;text-align:'+(isMe?'right':'left')+';padding:0 2px;';
    timeEl.textContent = ts;
    bw.appendChild(bubble); bw.appendChild(timeEl);
    if (isMe) {
      const delBtn = document.createElement('button'); delBtn.type='button'; delBtn.textContent='✕';
      delBtn.style.cssText = 'background:none;border:none;cursor:pointer;color:#c5bfb8;font-size:10px;padding:0 4px;align-self:center;flex-shrink:0;opacity:0;transition:opacity 0.2s;';
      delBtn.onclick = async () => {
        const updated = messages.filter((_,i) => i !== idx);
        try { await updateDoc(doc(db,'conversations',key),{messages:updated}); } catch(e){console.error(e);}
      };
      mb.appendChild(delBtn); mb.appendChild(bw);
      mb.onmouseenter=()=>delBtn.style.opacity='1'; mb.onmouseleave=()=>delBtn.style.opacity='0';
    } else {
      mb.appendChild(bw);
    }
    container.appendChild(mb);
  });
  container.scrollTop = container.scrollHeight;

  // Trigger capybara rain if new message from capybara
  if(newCount > prevCount && messages.length > 0){
    const lastMsg = messages[messages.length-1];
    const sender = STATE.users[lastMsg.senderId];
    if(sender && isCapybara(sender) && lastMsg.senderId !== STATE.currentUser?.uid){
      // Animate last bubble
      const lastBubble = container.lastElementChild;
      if(lastBubble) lastBubble.style.animation = 'capy-message 0.6s cubic-bezier(0.34,1.56,0.64,1)';
      triggerCapybaraRain();
    }
  }
}

  const hasUnread = messages.some(m=>m.senderId!==STATE.currentUser.uid&&!m.read);
  if(hasUnread){const updated=messages.map(m=>m.senderId!==STATE.currentUser.uid?{...m,read:true}:m);updateDoc(doc(db,'conversations',key),{messages:updated}).catch(()=>{});}

  const root=document.createElement('div');root.style.cssText='display:flex;flex-direction:column;height:calc(100vh - 120px);background:#f0ebe3;';

  // Header
  const hd=document.createElement('div');hd.style.cssText='background:#fff;padding:12px 16px;border-bottom:1px solid #f5f2ee;display:flex;gap:12px;align-items:center;flex-shrink:0;';

  hInfo.appendChild(hn);hInfo.appendChild(hs);hd.appendChild(hInfo);

  // Action icons
  const acts=document.createElement('div');acts.style.cssText='display:flex;gap:4px;';
  ['📞','📹','ℹ'].forEach(ic=>{const b=document.createElement('button');b.type='button';b.textContent=ic;b.style.cssText='background:none;border:none;cursor:pointer;font-size:18px;color:#a09890;padding:6px;border-radius:8px;';acts.appendChild(b);});
  hd.appendChild(acts);root.appendChild(hd);

  // Messages area
  const msgsDiv=document.createElement('div');msgsDiv.id='conv-messages';
  msgsDiv.style.cssText='flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;background:#f0ebe3;';
  updateMessagesList(msgsDiv,uid);
  root.appendChild(msgsDiv);

  // Input area
  const inp=document.createElement('div');inp.style.cssText='background:#fff;padding:12px 16px;border-top:1px solid #f5f2ee;display:flex;gap:10px;align-items:center;flex-shrink:0;';

  // Emoji / attach buttons
  const emojiBtn=document.createElement('button');emojiBtn.type='button';emojiBtn.textContent='😊';emojiBtn.style.cssText='background:none;border:none;cursor:pointer;font-size:20px;color:#a09890;padding:4px;';
  const attachBtn=document.createElement('button');attachBtn.type='button';attachBtn.textContent='📎';attachBtn.style.cssText='background:none;border:none;cursor:pointer;font-size:20px;color:#a09890;padding:4px;';
  inp.appendChild(emojiBtn);inp.appendChild(attachBtn);

  const ti=document.createElement('input');ti.type='text';ti.id='msg-input';ti.name='message';ti.placeholder='Écrire un message...';
  ti.style.cssText='flex:1;background:#f5f2ee;border:none;border-radius:22px;padding:11px 18px;font-size:14px;color:#1a1a1a;outline:none;';
  ti.value=STATE.msgInput||'';
  ti.addEventListener('input',e=>{STATE.msgInput=e.target.value;});
  ti.addEventListener('focus',()=>{ti.value=STATE.msgInput||'';});

  const send=async()=>{
    const txt=(STATE.msgInput||ti.value||'').trim();if(!txt)return;
    ti.value='';STATE.msgInput='';
    const newMsg={senderId:STATE.currentUser.uid,text:txt,ts:Date.now(),read:false};
    const convRef=doc(db,'conversations',key);
    try{
      const snap=await getDoc(convRef);
      if(snap.exists())await updateDoc(convRef,{messages:arrayUnion(newMsg),updatedAt:serverTimestamp()});
      else await setDoc(convRef,{participants:[STATE.currentUser.uid,uid],messages:[newMsg],updatedAt:serverTimestamp()});
      // Store notification for recipient
      const notifRef = doc(db,'notifications',uid);
      const me = STATE.userProfile||{};
      await setDoc(notifRef, {
        unreadMessages: arrayUnion({
          from: STATE.currentUser.uid,
          fromName: me.displayName||'',
          fromHandle: me.handle||'',
          text: txt,
          ts: Date.now(),
          convKey: key
        }),
        // FCM will be triggered by Cloud Function or checked on next load
        lastMessageAt: serverTimestamp()
      }, {merge: true});
    }catch(e){console.error(e);toast('Erreur envoi',true);}
  };
  ti.addEventListener('keydown',e=>{if(e.key==='Enter')send();});

  const sendBtn=document.createElement('button');sendBtn.type='button';sendBtn.textContent='↑';
  sendBtn.style.cssText='background:#1a1a1a;color:#fff;border:none;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:16px;flex-shrink:0;';
  sendBtn.onclick=send;
  inp.appendChild(ti);inp.appendChild(sendBtn);root.appendChild(inp);
  setTimeout(()=>msgsDiv.scrollTop=msgsDiv.scrollHeight,30);
  return root;
}

// ── Admin action handler (event delegation) ──────────────────────
function handleAdminAction(action, data){
  lockRender(800);
  switch(action){
    case 'tab':
      STATE.adminSection = data.id;
      refreshAdmin();
      break;
    case 'confirm-delete':
      STATE.adminConfirm = {type:data.type, id:data.id, uid:data.uid, name:data.name};
      refreshAdmin();
      break;
    case 'cancel-confirm':
      STATE.adminConfirm = null;
      refreshAdmin();
      break;
    case 'do-delete':
      (async()=>{
        if(STATE.adminConfirm?.type==='post'){
          try{await deleteDoc(doc(db,'posts',STATE.adminConfirm.id));}catch(e){toast('Erreur',true);}
        } else if(STATE.adminConfirm?.type==='user'){
          try{
            const ups=STATE.posts.filter(p=>p.userId===STATE.adminConfirm.uid);
            await Promise.all(ups.map(p=>deleteDoc(doc(db,'posts',p.id))));
            await deleteDoc(doc(db,'users',STATE.adminConfirm.uid));
            delete STATE.users[STATE.adminConfirm.uid];
          }catch(e){toast('Erreur',true);}
        }
        STATE.adminConfirm=null;
        refreshAdmin();
      })();
      break;
    case 'set-role':
      (async()=>{
        const upd={isAdmin:data.role==='admin'||data.role==='superAdmin',isSuperAdmin:data.role==='superAdmin'};
        try{await updateDoc(doc(db,'users',data.uid),upd);STATE.users[data.uid]={...STATE.users[data.uid],...upd};toast('Rôle mis à jour');}
        catch(e){toast('Erreur : '+e.message,true);}
        refreshAdmin();
      })();
      break;
    case 'set-grade':
      (async()=>{
        const newGrade=data.grade==='none'?null:data.grade;
        try{await updateDoc(doc(db,'users',data.uid),{grade:newGrade});STATE.users[data.uid]={...STATE.users[data.uid],grade:newGrade};toast('Grade mis à jour');}
        catch(e){toast('Erreur : '+e.message,true);}
        refreshAdmin();
      })();
      break;
    case 'promote-admin':
      (async()=>{
        try{await updateDoc(doc(db,'users',data.uid),{isAdmin:true});}catch(e){toast('Erreur',true);}
        STATE.users[data.uid]={...STATE.users[data.uid],isAdmin:true};toast('Promu Admin');
        refreshAdmin();
      })();
      break;
    case 'degrade-admin':
      (async()=>{
        try{await updateDoc(doc(db,'users',data.uid),{isAdmin:false});}catch(e){toast('Erreur',true);}
        STATE.users[data.uid]={...STATE.users[data.uid],isAdmin:false};toast('Rétrogradé');
        refreshAdmin();
      })();
      break;
    case 'save-mod-config':
      (async()=>{
        try{
          await setDoc(doc(db,'config','moderation'),{
            mode: data.mode,
            discordWebhook: data.webhook||'',
            updatedAt: serverTimestamp()
          });
          STATE.modConfig={mode:data.mode,discordWebhook:data.webhook||''};
          toast('Configuration de modération sauvegardée');
        }catch(e){toast('Erreur : '+e.message,true);}
        refreshAdmin();
      })();
      break;
    case 'report-post':
      (async()=>{
        const post=STATE.posts.find(p=>p.id===data.postId);
        const reporter=STATE.userProfile||{};
        const author=STATE.users[post?.userId]||{};
        if(!post){toast('Post introuvable',true);return;}
        const cfg=STATE.modConfig||{};
        // Send to app (save in Firestore)
        if(cfg.mode==='app'||cfg.mode==='both'){
          try{
            await setDoc(doc(db,'reports',data.postId+'_'+STATE.currentUser.uid),{
              postId:data.postId,
              postContent:post.content||'(media)',
              authorId:post.userId,
              authorHandle:author.handle||'?',
              reportedBy:STATE.currentUser.uid,
              reporterHandle:reporter.handle||'?',
              reason:data.reason||'Non spécifiée',
              ts:serverTimestamp()
            });
          }catch(e){console.error(e);}
        }
        // Send to Discord
        if((cfg.mode==='discord'||cfg.mode==='both')&&cfg.discordWebhook){
          try{
            await fetch(cfg.discordWebhook,{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({
                username:'Æther Modération',
                avatar_url:'https://aether-reseau.github.io/Aether/logo_app_V3.png',
                embeds:[{
                  title:'🚨 Nouveau signalement',
                  color:0xc0392b,
                  fields:[
                    {name:'Post',value:(post.content||'(média)').slice(0,300)||'—',inline:false},
                    {name:'Auteur',value:'@'+(author.handle||author.displayName||'?'),inline:true},
                    {name:'Signalé par',value:'@'+(reporter.handle||'?'),inline:true},
                    {name:'Raison',value:data.reason||'Non spécifiée',inline:false},
                    {name:'ID Post',value:data.postId,inline:false}
                  ],
                  timestamp:new Date().toISOString()
                }]
              })
            });
          }catch(e){console.error('Discord webhook error:',e);}
        }
        toast('Signalement envoyé');
        setState({reportModal:null});
      })();
      break;
    case 'toggle-maintenance':
      (async()=>{
        const newVal=!STATE.maintenance;
        try{
          await setDoc(doc(db,'config','maintenance'),{enabled:newVal,updatedAt:serverTimestamp()});
          STATE.maintenance=newVal;
          toast(newVal?'Maintenance activée':'Maintenance désactivée');
        }catch(e){toast('Erreur : '+e.message,true);}
        refreshAdmin();
      })();
      break;
  }
}

function refreshAdmin(){
  const container = document.getElementById('admin-root');
  if(!container){render();return;}
  container.innerHTML='';
  buildAdminContent(container);
}

function renderAdmin(){
  const root = document.createElement('div');
  root.id = 'admin-root';
  root.style.cssText = 'background:#faf7f3;padding-bottom:20px;';
  // Attach ONE delegated listener on the stable root
  root.addEventListener('click', e=>{
    const btn = e.target.closest('[data-action]');
    if(!btn) return;
    e.preventDefault(); e.stopPropagation();
    const action = btn.dataset.action;
    let data = {};
    try{ data = JSON.parse(btn.dataset.payload||'{}'); }catch(err){}
    handleAdminAction(action, data);
  });
  buildAdminContent(root);
  return root;
}

function buildAdminContent(root){
  const sec  = STATE.adminSection;
  const conf = STATE.adminConfirm;
  const me   = STATE.userProfile||{};
  const isSuperAdmin = !!me.isSuperAdmin;
  const BG='#faf7f3',CARD='#f5f0ea',BDR='#ede8e0',TXT='#2a2420',

    container.appendChild(p({fontFamily:"'Lora',serif",fontSize:'12px',color:'#c5bfb8',fontStyle:'italic',padding:'4px 0'},'Aucune suggestion.'));

  }
  users.forEach(u=>{
    const followed=(me.followingIds||[]).includes(u.uid);
    const row=div({display:'flex',gap:'10px',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #ede8e0',cursor:'pointer'});

  else if(tab==='me'&&editing)  cw.appendChild(renderEditProfile());
  else if(tab==='admin'&&(me.isAdmin||me.isSuperAdmin)) cw.appendChild(renderAdmin());
  else if(tab==='profile'&&profileUid){
    const u=STATE.users[profileUid];
    if(u) cw.appendChild(renderProfile(u,false,()=>setState({tab:'explore',profileUid:null})));
    else{cw.appendChild(Spinner());fetchUserProfile(profileUid).then(()=>render());}
  }
  center.appendChild(cw);contentRow.appendChild(center);

  // ══ RIGHT PANEL ══════════════════════════════════
  if(showRight){
    const right=document.createElement('div');
    right.style.cssText='width:300px;flex-shrink:0;height:100%;overflow-y:auto;background:var(--bg);padding:24px 16px 24px 0;';

    // Suggestions
    const sugCard=document.createElement('div');sugCard.className='ae-panel-card';
    const sugHdr=document.createElement('div');sugHdr.className='ae-panel-card-header';
    const sugTtl=document.createElement('span');sugTtl.className='ae-panel-card-title';sugTtl.textContent='Suggestions';
    const sugAll=document.createElement('span');sugAll.className='ae-panel-see-all';sugAll.textContent='Voir tout';sugAll.onclick=()=>setState({tab:'explore'});
    sugHdr.appendChild(sugTtl);sugHdr.appendChild(sugAll);sugCard.appendChild(sugHdr);

    const suggestions=Object.values(STATE.users).filter(u=>u.uid!==STATE.currentUser?.uid&&u.handle&&!(me.followingIds||[]).includes(u.uid)).slice(0,3);
    suggestions.forEach(u=>{
      const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);';
      row.appendChild(Avatar(u,38));
      const info=document.createElement('div');info.style.cssText='flex:1;min-width:0;';
      const dn=document.createElement('div');dn.style.cssText='font-size:13px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';dn.textContent=u.displayName||'';
      const hn=document.createElement('div');hn.style.cssText='font-size:11px;color:var(--text-muted);';hn.textContent='@'+(u.handle||'');
      info.appendChild(dn);info.appendChild(hn);row.appendChild(info);
      const followed=(me.followingIds||[]).includes(u.uid);
      const fb=document.createElement('button');fb.type='button';fb.textContent=followed?'Abonné':'Suivre';
      fb.className='ae-btn-secondary';fb.style.cssText+='padding:5px 13px;font-size:12px;';
      fb.onclick=async(e)=>{
        e.stopPropagation();
        try{const myRef=doc(db,'users',STATE.currentUser.uid);const thRef=doc(db,'users',u.uid);
          if(followed){await updateDoc(myRef,{following:increment(-1),followingIds:arrayRemove(u.uid)});await updateDoc(thRef,{followers:increment(-1)});}
          else{await updateDoc(myRef,{following:increment(1),followingIds:arrayUnion(u.uid)});await updateDoc(thRef,{followers:increment(1)});}
          const thSnap=await getDoc(thRef);if(thSnap.exists())STATE.users[u.uid]={uid:u.uid,...thSnap.data()};render();
        }catch(err){console.error(err);}
      };
      const closeX=document.createElement('button');closeX.type='button';closeX.textContent='×';closeX.style.cssText='background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);padding:2px 4px;';
      row.appendChild(fb);row.appendChild(closeX);sugCard.appendChild(row);
    });
    if(!suggestions.length){const ns=document.createElement('p');ns.style.cssText="font-size:12px;color:var(--text-muted);font-style:italic;font-family:'Lora',serif;padding:14px 18px;";ns.textContent='Aucune suggestion.';sugCard.appendChild(ns);}
    right.appendChild(sugCard);

    // Trends
    const trendsMap={};STATE.posts.forEach(p=>{(p.content||'').split(/\s+/).filter(w=>w.startsWith('#')&&w.length>1).forEach(t=>{trendsMap[t]=(trendsMap[t]||0)+1;});});
    const staticTrends=[['#design',12400],['#photographie',8700],['#mindset',5200],['#inspiration',4100],['#creation',3300]];
    const trends=Object.entries(trendsMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const trendData=trends.length?trends:staticTrends;
    const trendsCard=document.createElement('div');trendsCard.className='ae-panel-card';
    const tHdr=document.createElement('div');tHdr.className='ae-panel-card-header';
    const tTtl=document.createElement('span');tTtl.className='ae-panel-card-title';tTtl.textContent='Tendances';
    const tAll=document.createElement('span');tAll.className='ae-panel-see-all';tAll.textContent='Voir tout';
    tHdr.appendChild(tTtl);tHdr.appendChild(tAll);trendsCard.appendChild(tHdr);
    trendData.forEach(([tag,count])=>{
      const tr=document.createElement('div');tr.className='ae-trend-item';
      const tn=document.createElement('div');tn.className='ae-trend-tag';tn.textContent=tag;
      const tc=document.createElement('div');tc.className='ae-trend-count';
      tc.textContent=(count>=1000?(count/1000).toFixed(1).replace('.',',')+' K':count)+' publications';
      tr.appendChild(tn);tr.appendChild(tc);trendsCard.appendChild(tr);
    });
    right.appendChild(trendsCard);

    // Communities
    const commCard=document.createElement('div');commCard.className='ae-panel-card';
    const cHdr=document.createElement('div');cHdr.className='ae-panel-card-header';
    const cTtl=document.createElement('span');cTtl.className='ae-panel-card-title';cTtl.textContent='Communautés';
    const cAll=document.createElement('span');cAll.className='ae-panel-see-all';cAll.textContent='Voir tout';
    cHdr.appendChild(cTtl);cHdr.appendChild(cAll);commCard.appendChild(cHdr);
    [['Photographie','24,8 K','#c9b99a'],['Design & Création','18,6 K','#a8c5b5'],['Développement','15,3 K','#b5a8c5']].forEach(([name,members,color])=>{
      const cr=document.createElement('div');cr.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);';
      const ca=document.createElement('div');ca.style.cssText='width:38px;height:38px;border-radius:10px;background:'+color+';flex-shrink:0;';
      const ci=document.createElement('div');ci.style.flex='1';
      const cn=document.createElement('div');cn.style.cssText='font-size:13px;font-weight:600;color:var(--text-primary);';cn.textContent=name;
      const cm=document.createElement('div');cm.style.cssText='font-size:11px;color:var(--text-muted);';cm.textContent=members+' membres';
      ci.appendChild(cn);ci.appendChild(cm);
      const cb=document.createElement('button');cb.type='button';cb.textContent='Rejoindre';
      cb.className='ae-btn-secondary';cb.style.cssText+='padding:5px 12px;font-size:11px;white-space:nowrap;';
      cr.appendChild(ca);cr.appendChild(ci);cr.appendChild(cb);commCard.appendChild(cr);
    });
    right.appendChild(commCard);
    contentRow.appendChild(right);
  }

  mainArea.appendChild(contentRow);
  layout.appendChild(mainArea);

  if(STATE.toast){
    const t=document.createElement('div');t.className='ae-toast';
    if(STATE.toast.isErr)t.style.background='var(--danger)';
    t.textContent=STATE.toast.msg;layout.appendChild(t);
  }
  return layout;
}

// SVG icon helper
function makeSVGIcon(pathD, stroke='currentColor', size=20){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',String(size));svg.setAttribute('height',String(size));
  svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');
  svg.setAttribute('stroke',stroke);svg.setAttribute('stroke-width','1.75');
  svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');
  svg.style.cssText='flex-shrink:0;pointer-events:none;';
  const p=document.createElementNS(ns,'path');p.setAttribute('d',pathD);svg.appendChild(p);
  return svg;
}
