const CLOUDINARY = {
  cloudName:   "dcdwsb9dv",
  uploadPreset:"aether_media"
};

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY.uploadPreset);
  fd.append('folder', 'aether');
  const res = await fetch(
    'https://api.cloudinary.com/v1_1/' + CLOUDINARY.cloudName + '/auto/upload',
    { method: 'POST', body: fd }
  );
  if (!res.ok) throw new Error('Cloudinary upload failed');
  const data = await res.json();
  return { url: data.secure_url, type: file.type.startsWith('video/') ? 'video' : 'image', publicId: data.public_id };
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {

  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:528px;background:#2a2420;color:#f5f0ea;padding:14px 16px;border-radius:12px;display:flex;align-items:center;gap:12px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-family:"DM Sans",sans-serif;animation:slideUp 0.3s ease;';

  const t1 = document.createElement('div'); t1.style.cssText='font-size:13px;font-weight:600;margin-bottom:2px;'; t1.textContent='Installer Æther';
  const t2 = document.createElement('div'); t2.style.cssText='font-size:11px;opacity:0.7;'; t2.textContent='Accès rapide depuis votre écran d’accueil';
  info.appendChild(t1); info.appendChild(t2);
  const installBtn = document.createElement('button');
  installBtn.id = 'install-btn';
  installBtn.textContent = 'Installer';
  installBtn.style.cssText = 'background:#c17a4a;border:none;color:#fff;padding:8px 16px;border-radius:20px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;';

  closeBtn.id = 'install-close';

  closeBtn.style.cssText = 'background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;';
  banner.appendChild(info);

// ── DOM helpers ───────────────────────────────────────────────────
const el = (tag,props={},ch=[]) => {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(props)){
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html') e.innerHTML=v;
    else e[k]=v;
  }
  // ch can be array, string, or single node
  const children = Array.isArray(ch)?ch:(ch!=null?[ch]:[]);
  for(const c of children){
    if(c==null||c===false)continue;
    if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node) e.appendChild(c);
  }
  return e;
};
const div  = (s,ch)  => el('div',{style:s||{}},ch||[]);
const span = (s,t)   => { const e=el('span',{style:s||{}}); e.textContent=t||''; return e; };
const btn  = (s,t,f) => {
  const b=el('button',{style:s||{},onClick:f});
  if(typeof t==='string'){ b.textContent=t; }
  else if(Array.isArray(t)){ t.forEach(c=>{ if(c==null)return; b.appendChild(typeof c==='string'?document.createTextNode(c):c); }); }
  else if(t){ b.appendChild(t); }
  return b;
};
const p    = (s,t)   => { const e=el('p',{style:s||{}}); e.textContent=t||''; return e; };

// ── User profile cache ────────────────────────────────────────────
async function fetchUserProfile(uid){
  if(STATE.users[uid]) return STATE.users[uid];
  try{
    const snap=await getDoc(doc(db,'users',uid));
    if(snap.exists()){
      const p={uid,...snap.data()};
      STATE.users[uid]=p;
      return p;
    }
  }catch(e){}
  return {uid,displayName:'Utilisateur',handle:'?',avatarColor:'#a09890'};
}

function getUserCached(uid){
  return STATE.users[uid]||{uid,displayName:'Utilisateur',handle:'?',avatarColor:'#a09890'};
}

// ── Subscribe to posts ────────────────────────────────────────────
function subscribeToPosts(){
  if(unsubPosts) unsubPosts();
  const q=query(collection(db,'posts'),orderBy('createdAt','desc'));
  unsubPosts=onSnapshot(q,async snap=>{
    const posts=[];
    const uidsToFetch=new Set();
    snap.forEach(d=>{const p={id:d.id,...d.data()};posts.push(p);if(p.userId)uidsToFetch.add(p.userId);});
    // Fetch unknown users
    await Promise.all([...uidsToFetch].filter(uid=>!STATE.users[uid]).map(fetchUserProfile));
    STATE.posts=posts;
    STATE.postsLoading=false;
    render();
  });
}

// Subscribe to own profile in real-time (follows, profile updates)
function subscribeToProfile(uid){
  if(unsubProfile) unsubProfile();
  unsubProfile = onSnapshot(doc(db,'users',uid), snap=>{
    if(snap.exists()){
      const profile = {uid, ...snap.data()};
      STATE.userProfile = profile;
      STATE.users[uid] = profile;
      // Keep currentUser followingIds in sync
      STATE.currentUser = {...STATE.currentUser, followingIds: profile.followingIds||[], following: profile.following||0};
      render();
    }
  });
}

// ══════════════════════════════════════════════════════════════════
function renderAuth(){
  const {authMode:mode,authStep:step,authForm:f,authErrors:err,authDone:done,authLoading:loading}=STATE;
  const setF=(k,v)=>{
    STATE.authForm={...STATE.authForm,[k]:v};
    // Only re-render for non-text fields (checkboxes, selects)
    // For text fields, just update state silently
  };

  const wrap=div({minHeight:'100vh',background:'#f5f0ea',display:'flex',justifyContent:'center',alignItems:'center',padding:'20px'});
  const card=div({width:'100%',maxWidth:'400px',background:'#faf7f3',padding:'40px 32px',boxShadow:'0 4px 40px rgba(42,36,32,0.09)',animation:'fadeIn 0.5s ease'});

  // Logo
  card.appendChild(div({textAlign:'center',marginBottom:'36px'},[
    el('div',{style:{fontFamily:"'Lora',serif",fontWeight:500,fontSize:'32px',color:'#2a2420',letterSpacing:'-0.03em'}},'Æther'),
    el('div',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'10px',color:'#c5bfb8',textTransform:'uppercase',letterSpacing:'0.18em',marginTop:'4px'}},'réseau social')
  ]));

  if(done){
    card.appendChild(div({textAlign:'center',padding:'24px 0'},[
      el('div',{style:{fontSize:'40px',marginBottom:'14px'}},'◎'),
      p({...S.serif(17)},'Bienvenue sur Æther.'),
      p({...S.sans(12,'#a09890'),marginTop:'8px'},'Connexion en cours…')
    ]));
  } else if(mode==='login'){
    card.appendChild(el('div',{style:{...S.LBL,marginBottom:'24px'}},'Connexion'));
    card.appendChild(Field('Email','email',f.email,v=>setF('email',v),err.email,'vous@email.com'));
    card.appendChild(Field('Mot de passe','password',f.password,v=>setF('password',v),err.password,'••••••••'));

    const loginBtn=btn({...S.BTN,opacity:loading?0.6:1},'Se connecter',async()=>{
      if(STATE.authLoading)return;
      const af=STATE.authForm;
      const e={};
      if(!af.email.trim()) e.email='Requis';
      if(!af.password)     e.password='Requis';
      if(Object.keys(e).length){setState({authErrors:e});return;}
      setState({authLoading:true,authErrors:{}});
      try{
        await signInWithEmailAndPassword(auth,af.email.trim(),af.password);
      }catch(ex){
        let msg='Erreur de connexion';
        if(ex.code==='auth/user-not-found'||ex.code==='auth/wrong-password'||ex.code==='auth/invalid-credential') msg='Email ou mot de passe incorrect';
        if(ex.code==='auth/too-many-requests') msg='Trop de tentatives, réessayez plus tard';
        setState({authLoading:false,authErrors:{global:msg}});
      }
    });
    card.appendChild(loginBtn);
    if(err.global) card.appendChild(div({fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#c17a4a',marginTop:'8px',textAlign:'center'},[err.global]));
    card.appendChild(div({textAlign:'center',marginTop:'20px'},[
      span(S.sans(12,'#a09890'),'Pas encore de compte ? '),
      btn({...S.LINK},'Créer un compte',()=>setState({authMode:'register',authStep:1,authErrors:{},authForm:{name:'',email:'',password:'',confirm:'',bio:''}}))
    ]));
  } else {
    // Register
    const header=div({display:'flex',alignItems:'center',gap:'10px',marginBottom:'24px'},[
      el('div',{style:S.LBL},'Créer un compte')
    ]);
    const prog=div({marginLeft:'auto',display:'flex',gap:'4px'});
    [1,2].forEach(s=>prog.appendChild(div({width:'22px',height:'3px',borderRadius:'2px',background:step>=s?'#2a2420':'#e0dbd4'})));
    header.appendChild(prog);
    card.appendChild(header);

    if(step===1){
      card.appendChild(Field('Nom complet','text',f.name,v=>setF('name',v),err.name,'Prénom Nom'));
      card.appendChild(Field('Email','email',f.email,v=>setF('email',v),err.email,'vous@email.com'));
      card.appendChild(Field('Mot de passe','password',f.password,v=>setF('password',v),err.password,'••••••••'));
      card.appendChild(Field('Confirmer','password',f.confirm,v=>setF('confirm',v),err.confirm,'••••••••'));
      card.appendChild(btn({...S.BTN},'Continuer →',()=>{
        const af=STATE.authForm;
        const e={};
        if(!af.name.trim())      e.name='Requis';
        if(!af.email.trim())     e.email='Requis';
        else if(!/\S+@\S+\.\S+/.test(af.email)) e.email='Email invalide';
        if(!af.password)         e.password='Requis';
        else if(af.password.length<6) e.password='6 caractères minimum';
        if(af.password!==af.confirm)   e.confirm='Ne correspond pas';
        if(Object.keys(e).length){setState({authErrors:e});return;}
        setState({authErrors:{},authStep:2});
      }));
    } else {
      // Step 2: handle + bio
      card.appendChild(Field('Identifiant (@)','text',f.handle||'',v=>setF('handle',v),err.handle,'votre_pseudo'));
      const bioW=div({marginBottom:'20px'},[el('label',{style:S.LBL},'Bio (optionnel)')]);
      const bioTA=el('textarea',{placeholder:'En quelques mots…',rows:3,style:{width:'100%',border:'none',borderBottom:'1.5px solid #d5cfc8',outline:'none',padding:'8px 0',fontFamily:"'Lora',serif",fontSize:'14px',color:'#2a2420',background:'transparent',resize:'none',lineHeight:1.6,display:'block'}});
      bioTA.value=f.bio||'';
      bioTA.addEventListener('input',e=>{ STATE.authForm={...STATE.authForm,bio:e.target.value}; });
      bioW.appendChild(bioTA);
      card.appendChild(bioW);

      const regBtn=btn({...S.BTN,opacity:loading?0.6:1},'Rejoindre Æther',async()=>{
        if(STATE.authLoading)return;
        const af=STATE.authForm;
        const e={};
        const handle=(af.handle||'').trim().toLowerCase();
        if(!handle)           e.handle='Requis';
        else if(!/^[a-z0-9_]{3,20}$/.test(handle)) e.handle='3-20 car. : lettres minuscules, chiffres, _';
        if(Object.keys(e).length){setState({authErrors:e});return;}
        // Create account
        setState({authLoading:true,authErrors:{}});
        try{
          // Step 1: create Firebase Auth account first
          const cred=await createUserWithEmailAndPassword(auth,af.email.trim(),af.password);
          await updateProfile(cred.user,{displayName:af.name.trim()});
          // Step 2: wait for auth token to be fully ready
          await cred.user.getIdToken(true);
          // Step 3: save profile in Firestore (now authenticated)
          const profileData = {
            displayName: af.name.trim(),
            handle:      handle,
            bio:         af.bio.trim()||'Nouveau sur Æther',
            email:       af.email.trim(),
            followers:   0,
            following:   0,
            followingIds:[],
            avatarColor: AV_COLORS[Math.floor(Math.random()*AV_COLORS.length)],
            joinDate:    new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'}),
            createdAt:   serverTimestamp(),
          };
          // Retry up to 3 times in case token propagation is slow
          let saved=false;
          for(let i=0;i<3;i++){
            try{
              await setDoc(doc(db,'users',cred.user.uid), profileData);
              saved=true; break;
            }catch(e2){
              if(i<2) await new Promise(r=>setTimeout(r,1000));
              else throw e2;
            }
          }
          setState({authDone:true,authLoading:false});
        }catch(ex){
          let msg='Erreur lors de la création';
          if(ex.code==='auth/email-already-in-use') msg='Cet email est déjà utilisé';
          else if(ex.code==='auth/network-request-failed') msg='Pas de connexion réseau';
          else if(ex.code==='auth/unauthorized-domain') msg='Domaine non autorisé dans Firebase Authentication → Settings → Domaines autorisés';
          else if(ex.code==='auth/operation-not-allowed') msg='Email/Password non activé dans Firebase Authentication';
          else if(ex.code==='auth/invalid-api-key') msg='Clé API Firebase invalide';
          else msg='Erreur: ' + (ex.code || ex.message || JSON.stringify(ex));
          console.error('Firebase error:', ex);
          setState({authLoading:false,authErrors:{global:msg}});
        }
      });
      card.appendChild(regBtn);
      if(err.global) card.appendChild(div({fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#c17a4a',marginTop:'8px',textAlign:'center'},[err.global]));
      card.appendChild(btn({...S.LINK,display:'block',margin:'12px auto 0'},'← Retour',()=>setState({authStep:1,authErrors:{}})));
    }
    card.appendChild(div({textAlign:'center',marginTop:'20px'},[
      span(S.sans(12,'#a09890'),'Déjà membre ? '),
      btn({...S.LINK},'Se connecter',()=>setState({authMode:'login',authStep:1,authErrors:{},authForm:{name:'',email:'',password:'',confirm:'',bio:''}}))
    ]));
  }

  if(loading) card.appendChild(div({textAlign:'center',marginTop:'16px'},[Spinner()]));
  wrap.appendChild(card);
  return wrap;
}

// ══════════════════════════════════════════════════════════════════
// FEED
// ══════════════════════════════════════════════════════════════════
function renderFeed(){
  const me=STATE.userProfile;
  const root=div({});

  // Compose box
  const compose=div({padding:'16px',borderBottom:'1px solid #ede8e0'});
  const row=div({display:'flex',gap:'12px'});
  row.appendChild(Avatar(me,36));
  const col=div({flex:1,minWidth:0});
  const ta=el('textarea',{placeholder:'Partagez une pensée…',rows:3,style:{width:'100%',border:'none',outline:'none',resize:'none',fontFamily:"'Lora',serif",fontSize:'15px',color:'#2a2420',background:'transparent',lineHeight:1.7,minHeight:'60px',display:'block'}});
  ta.value=STATE.composeText||'';
  ta.addEventListener('input',e=>{ STATE.composeText=e.target.value; const pb=ta.closest('div')?.querySelector('button[data-pub]'); if(pb) pb.style.opacity=(STATE.composeText.trim()||STATE.composeMedia)?1:0.4; });
  col.appendChild(ta);

  if(STATE.composeMedia){
    const prev=div({position:'relative',marginTop:'10px',borderRadius:'8px',overflow:'hidden',background:'#f0ebe4'});
    const m=STATE.composeMedia;
    prev.appendChild(m.type==='image'
      ?el('img',{src:m.url,style:{width:'100%',maxHeight:'240px',objectFit:'cover',display:'block'}})
      :el('video',{src:m.url,controls:true,style:{width:'100%',maxHeight:'240px',display:'block'}}));
    prev.appendChild(btn({position:'absolute',top:'8px',right:'8px',background:'rgba(42,36,32,0.7)',border:'none',color:'#fff',width:'26px',height:'26px',borderRadius:'50%',cursor:'pointer',fontSize:'13px'},'✕',()=>setState({composeMedia:null})));
    col.appendChild(prev);
  }

  const fileInp=el('input',{type:'file',style:{display:'none'}});
  fileInp.addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file)return;
    const url=URL.createObjectURL(file);
    setState({composeMedia:{file,url,type:file.type.startsWith('video/')?'video':'image'}});
    e.target.value='';
  });

  const actions=div({display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'10px'});
  const mediaBtns=div({display:'flex',gap:'6px'});
  const mkMBtn=(icon,accept)=>btn({background:'none',border:'1px solid #e0dbd4',padding:'5px 10px',borderRadius:'16px',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#a09890'},icon,()=>{fileInp.accept=accept;fileInp.click();});
  mediaBtns.appendChild(mkMBtn('🖼 Photo','image/*'));
  mediaBtns.appendChild(mkMBtn('▶ Vidéo','video/*'));
  mediaBtns.appendChild(fileInp);
  actions.appendChild(mediaBtns);

  let publishing=false;
  const pubBtn=btn({...S.BTN,width:'auto',padding:'7px 18px',marginTop:'0',opacity:0.4},'Publier',async()=>{
    if(publishing) return;
    const txt=STATE.composeText.trim();
    const med=STATE.composeMedia;
    if(!txt&&!med) return;
    publishing=true;
    pubBtn.style.opacity='0.6';
    pubBtn.textContent='…';
    try{
      let mediaData=null;
      if(med?.file){
        pubBtn.textContent='…';
        try {
          if(med.type==='video'){
            // Videos → Cloudinary
            mediaData = await uploadToCloudinary(med.file);
          } else {
            // Images → base64 compressed
            const b64 = await new Promise((res,rej)=>{
              const img=new Image();
              img.onload=()=>{
                const canvas=document.createElement('canvas');
                const MAX=800;
                let w=img.width,h=img.height;
                if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
                if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
                canvas.width=w;canvas.height=h;
                canvas.getContext('2d').drawImage(img,0,0,w,h);
                res(canvas.toDataURL('image/jpeg',0.75));
              };
              img.onerror=rej;
              img.src=URL.createObjectURL(med.file);
            });
            mediaData={url:b64,type:'image'};
          }
        } catch(e) {
          toast('Erreur upload', true);
          publishing=false;
          render();
          return;
        }
      }
      await addDoc(collection(db,'posts'),{
        userId:      STATE.currentUser.uid,
        content:     txt,
        media:       mediaData,
        likes:       0,
        likedBy:     [],
        comments:    [],
        createdAt:   serverTimestamp(),
      });
      STATE.composeText='';
      STATE.composeMedia=null;
      toast('Publication envoyée !');
    }catch(ex){
      toast('Erreur lors de la publication','err');
      console.error(ex);
    }
    publishing=false;
    render();
  });
  // enable/disable
  pubBtn.dataset.pub='1';
  const checkPub=()=>{pubBtn.style.opacity=(STATE.composeText.trim()||STATE.composeMedia)?1:0.4;};
  checkPub();
  actions.appendChild(pubBtn);
  col.appendChild(actions);
  row.appendChild(col);
  compose.appendChild(row);
  root.appendChild(compose);

  if(STATE.postsLoading){root.appendChild(Spinner());return root;}

  // Posts list
  STATE.posts.forEach((post,i)=>{
    const u=getUserCached(post.userId)||{};
    const liked=(post.likedBy||[]).includes(STATE.currentUser.uid);
    const showC=STATE.openComments[post.id];

    const pd=div({padding:'16px',borderBottom:'1px solid #ede8e0'});
    const pr=div({display:'flex',gap:'12px'});
    pr.appendChild(Avatar(u,36));
    const pc=div({flex:1,minWidth:0});
    const ph=div({display:'flex',gap:'8px',alignItems:'baseline',marginBottom:'5px',flexWrap:'wrap'});
    ph.appendChild(el('span',{style:{...S.sans(14,'#2a2420',600)}},u.displayName||'Utilisateur'));
    ph.appendChild(el('span',{style:S.sans(12,'#a09890')},u.handle?`@${u.handle}`:''));
    // Time
    let timeStr='';
    if(post.createdAt?.toDate){
      const d=post.createdAt.toDate();
      const diff=Date.now()-d.getTime();
      if(diff<3600000)      timeStr=Math.floor(diff/60000)+'min';
      else if(diff<86400000)timeStr=Math.floor(diff/3600000)+'h';
      else                  timeStr=Math.floor(diff/86400000)+'j';
    }
    ph.appendChild(el('span',{style:{...S.sans(11,'#c5bfb8'),marginLeft:'auto'}},timeStr));
    pc.appendChild(ph);

    if(post.content) pc.appendChild(p({...S.serif(15,'#3a3430'),margin:'0 0 10px'},post.content));
    if(post.media?.url){
      const mw=div({marginBottom:'10px',borderRadius:'8px',overflow:'hidden'});
      mw.appendChild(post.media.type==='image'
        ?el('img',{src:post.media.url,style:{width:'100%',maxHeight:'360px',objectFit:'cover',display:'block'},loading:'lazy'})
        :el('video',{src:post.media.url,controls:true,playsInline:true,style:{width:'100%',maxHeight:'360px',display:'block',background:'#000'}}));
      pc.appendChild(mw);
    }

    const btns=div({display:'flex',gap:'18px'});
    // Like
    const likeBtn=btn({background:'none',border:'none',cursor:'pointer',padding:'0',display:'flex',alignItems:'center',gap:'5px',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:liked?'#c17a4a':'#a09890'},[
      el('span',{style:{fontSize:'15px'}},liked?'♥':'♡'),
      document.createTextNode((post.likes||0)+'')
    ],async()=>{
      const ref=doc(db,'posts',post.id);
      try{
        if(liked){
          await updateDoc(ref,{likes:increment(-1),likedBy:arrayRemove(STATE.currentUser.uid)});
        }else{
          await updateDoc(ref,{likes:increment(1),likedBy:arrayUnion(STATE.currentUser.uid)});
        }
      }catch(e){console.error(e);}
    });
    btns.appendChild(likeBtn);

    // Comments
    const commentCount=(post.comments||[]).length;
    const cBtn=btn({background:'none',border:'none',cursor:'pointer',padding:'0',display:'flex',alignItems:'center',gap:'5px',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#a09890'},[
      el('span',{style:{fontSize:'13px'}},'◯'),
      document.createTextNode(commentCount+'')
    ],()=>setState({openComments:{...STATE.openComments,[post.id]:!showC}}));
    btns.appendChild(cBtn);

    // Delete own post
    if(post.userId===STATE.currentUser.uid){
      const delBtn=btn({background:'none',border:'none',cursor:'pointer',padding:'0',display:'flex',alignItems:'center',marginLeft:'auto',color:'#c5bfb8',fontSize:'13px'},'✕',async()=>{
        if(!confirm('Supprimer ce post ?'))return;
        try{await deleteDoc(doc(db,'posts',post.id));}catch(e){console.error(e);}
      });
      btns.appendChild(delBtn);
    }
    pc.appendChild(btns);

    // Comments section
    if(showC){
      const cw=div({marginTop:'10px',paddingTop:'10px',borderTop:'1px solid #ede8e0'});
      (post.comments||[]).forEach(c=>{
        const cu=getUserCached(c.userId)||{};
        const cd=div({marginBottom:'6px',display:'flex',gap:'8px'});
        const cNameWrap=div({display:'flex',alignItems:'center',gap:'4px'});
        cNameWrap.appendChild(el('span',{style:{...S.sans(12,'#2a2420',600)}},cu.handle?'@'+cu.handle:cu.displayName||'?'));
        const cgb=GradeBadge(cu,true); if(cgb) cNameWrap.appendChild(cgb);
        cd.appendChild(cNameWrap);
        cd.appendChild(el('span',{style:S.serif(13,'#5a504a')},c.text));
        cw.appendChild(cd);
      });
      const ci=div({display:'flex',gap:'8px',marginTop:'8px'});
      const cinp=el('input',{type:'text',placeholder:'Répondre…',value:STATE.commentTexts[post.id]||'',style:{flex:1,border:'none',borderBottom:'1px solid #d5cfc8',outline:'none',padding:'4px 0',fontFamily:"'Lora',serif",fontSize:'13px',color:'#2a2420',background:'transparent'}});
      cinp.addEventListener('input',e=>{ STATE.commentTexts[post.id]=e.target.value; });
      const sendC=async()=>{
        const t=STATE.commentTexts[post.id]?.trim(); if(!t)return;
        const newComment={userId:STATE.currentUser.uid,text:t,createdAt:new Date().toISOString()};
        try{
          await updateDoc(doc(db,'posts',post.id),{comments:arrayUnion(newComment)});
          STATE.commentTexts={...STATE.commentTexts,[post.id]:''};
        }catch(e){console.error(e);}
      };
      cinp.addEventListener('keydown',e=>{if(e.key==='Enter')sendC();});
      ci.appendChild(cinp);
      ci.appendChild(btn({background:'none',border:'none',cursor:'pointer',color:'#c17a4a',fontSize:'14px',padding:'0 4px'},'↵',sendC));
      cw.appendChild(ci);
      pc.appendChild(cw);
    }

    pr.appendChild(pc);
    pd.appendChild(pr);
    root.appendChild(pd);
  });

  return root;
}

// ══════════════════════════════════════════════════════════════════
// VIDEOS
// ══════════════════════════════════════════════════════════════════
function renderVideos(){
  const q=(STATE.videoSearch||'').toLowerCase().trim();
  const showSearch=STATE.videoSearchOpen||false;
  const allVids=STATE.posts.filter(p=>{
    if(p.media?.type!=='video') return false;
    if(!q) return true;
    const u=getUserCached(p.userId)||{};
    return (p.content||'').toLowerCase().includes(q)||(u.handle||'').toLowerCase().includes(q)||(u.displayName||'').toLowerCase().includes(q);
  });
  const root=div({});

  // Search bar (collapsible)
  if(showSearch){
    const searchBar=div({padding:'10px 16px',borderBottom:'1px solid #ede8e0',background:'#faf7f3',display:'flex',alignItems:'center',gap:'8px'});
    const searchInp=el('input',{type:'search',placeholder:'Rechercher une vidéo...',value:STATE.videoSearch||'',style:{flex:1,border:'none',borderBottom:'1px solid #d5cfc8',outline:'none',padding:'6px 0',fontFamily:"'DM Sans',sans-serif",fontSize:'14px',color:'#2a2420',background:'transparent'}});
    // No re-render on keystroke — filter grid directly
    searchInp.addEventListener('input',e=>{ STATE.videoSearch=e.target.value; filterVideosGrid(grid); });
    searchInp.addEventListener('keydown',e=>{ if(e.key==='Escape'){ STATE.videoSearchOpen=false; STATE.videoSearch=''; render(); } });
    const clrBtn=btn({background:'none',border:'none',cursor:'pointer',color:'#a09890',fontSize:'14px',padding:'0 4px',flexShrink:0},'✕',()=>{ STATE.videoSearch=''; STATE.videoSearchOpen=false; render(); });
    searchBar.appendChild(searchInp);
    searchBar.appendChild(clrBtn);
    root.appendChild(searchBar);
    // Auto focus
    setTimeout(()=>searchInp.focus(),50);
  }

  if(!allVids.length&&!q){
    root.appendChild(div({display:'flex',flexDirection:'column',alignItems:'center',padding:'60px 24px',gap:'14px'},[
      el('div',{style:{fontSize:'36px',opacity:'0.3'}},'▶'),
      p({fontFamily:"'Lora',serif",fontSize:'14px',color:'#a09890',fontStyle:'italic',textAlign:'center'},"Aucune vidéo pour l'instant."),
      p({fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#c5bfb8',textAlign:'center'},'Publiez une vidéo depuis le fil.')
    ]));
    return root;
  }

  const grid=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'2px',padding:'0 2px'});
  buildVideoGrid(grid, allVids);
  root.appendChild(grid);
  return root;
}

function filterVideosGrid(grid){
  const q=(STATE.videoSearch||'').toLowerCase().trim();
  const allVids=STATE.posts.filter(p=>{
    if(p.media?.type!=='video') return false;
    if(!q) return true;
    const u=getUserCached(p.userId)||{};
    return (p.content||'').toLowerCase().includes(q)||(u.handle||'').toLowerCase().includes(q)||(u.displayName||'').toLowerCase().includes(q);
  });
  grid.innerHTML='';
  buildVideoGrid(grid, allVids);
}

function buildVideoGrid(grid, vids){
  vids.forEach(post=>{
    const u=getUserCached(post.userId)||{};
    const isActive=STATE.playingVideo===post.id;
    const cell=div({position:'relative',aspectRatio:'9/16',background:'#1a1612',overflow:'hidden',cursor:'pointer'});
    const vid=el('video',{src:post.media.url,loop:true,playsInline:true,style:{width:'100%',height:'100%',objectFit:'cover',display:'block'}});
    vid.muted=!isActive;
    if(isActive){vid.autoplay=true;vid.setAttribute('controls','');}
    cell.appendChild(vid);
    if(!isActive){
      const ov=div({position:'absolute',inset:'0',display:'flex',flexDirection:'column',justifyContent:'space-between',background:'linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.7))',padding:'8px'});
      ov.appendChild(div({alignSelf:'flex-end',background:'rgba(0,0,0,0.4)',borderRadius:'50%',width:'28px',height:'28px',display:'flex',alignItems:'center',justifyContent:'center'},[el('span',{style:{color:'#fff',fontSize:'11px',marginLeft:'2px'}},'▶')]));
      const info=div({});
      const ur=div({display:'flex',gap:'6px',alignItems:'center',marginBottom:'3px'});
      ur.appendChild(Avatar(u,20));
      ur.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'11px',color:'#fff',fontWeight:600}},'@'+(u.handle||'')));
      info.appendChild(ur);
      if(post.content){const pt=document.createElement('p');pt.style.cssText='font-family:"DM Sans",sans-serif;font-size:11px;color:rgba(255,255,255,0.85);margin:0;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;';pt.textContent=post.content;info.appendChild(pt);}
      info.appendChild(el('div',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'10px',color:'rgba(255,255,255,0.6)',marginTop:'2px'}},'♡ '+(post.likes||0)));
      ov.appendChild(info);
      cell.appendChild(ov);
    }
    cell.addEventListener('click',()=>setState({playingVideo:isActive?null:post.id}));
    grid.appendChild(cell);
  });
}

// ══════════════════════════════════════════════════════════════════
// PROFILE
// ══════════════════════════════════════════════════════════════════
function renderProfile(userProf,isMe,onBack){
  const me=STATE.userProfile||{};
  const myPosts=STATE.posts.filter(p=>p.userId===userProf.uid);
  const followed=(me.followingIds||[]).includes(userProf.uid);
  const root=div({});

  const hd=div({padding:'16px 16px 0',display:'flex',alignItems:'flex-start',justifyContent:'space-between'});
  const left=div({display:'flex',gap:'12px',alignItems:'center'});
  if(!isMe) left.appendChild(btn({background:'none',border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontSize:'16px',color:'#a09890',padding:'0',lineHeight:1},'←',onBack));
  left.appendChild(Avatar(userProf,64));
  hd.appendChild(left);
  if(isMe){
    hd.appendChild(btn({background:'none',border:'1px solid #d5cfc8',padding:'6px 12px',borderRadius:'16px',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#5a504a',cursor:'pointer'},'✎ Modifier',()=>setState({editing:true})));
  } else {
    hd.appendChild(btn({background:followed?'#2a2420':'none',border:'1px solid '+(followed?'#2a2420':'#d5cfc8'),padding:'6px 16px',borderRadius:'16px',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',fontWeight:600,color:followed?'#f5f0ea':'#5a504a',cursor:'pointer',transition:'all 0.2s'},followed?'Abonné ✓':'+ Suivre',async()=>{
      const myRef=doc(db,'users',STATE.currentUser.uid);
      const theirRef=doc(db,'users',userProf.uid);
      try{
        if(followed){
          await updateDoc(myRef,  {following:increment(-1),followingIds:arrayRemove(userProf.uid)});
          await updateDoc(theirRef,{followers:increment(-1)});
        }else{
          await updateDoc(myRef,  {following:increment(1),followingIds:arrayUnion(userProf.uid)});
          await updateDoc(theirRef,{followers:increment(1)});
        }
        // Refresh their profile in cache (own profile updated via onSnapshot)
        const tSnap=await getDoc(theirRef);
        if(tSnap.exists()) STATE.users[userProf.uid]={uid:userProf.uid,...tSnap.data()};
        render();
      }catch(e){console.error(e);}
    }));
  }
  root.appendChild(hd);

  const info=div({padding:'10px 16px 0'});
  const profNameRow=div({display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'2px'});
  profNameRow.appendChild(el('div',{style:{...S.sans(19,'#2a2420',700)}},userProf.displayName||''));
  const profgb=GradeBadge(userProf); if(profgb) profNameRow.appendChild(profgb);
  info.appendChild(profNameRow);
  if(userProf.handle) info.appendChild(el('div',{style:{...S.sans(13,'#a09890'),marginBottom:'4px'}},'@'+userProf.handle));
  if(userProf.bio) info.appendChild(p({...S.serif(13,'#5a504a'),lineHeight:1.6,marginBottom:'8px'},userProf.bio));
  const meta=div({display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'12px'});
  if(userProf.location) meta.appendChild(el('span',{style:S.sans(11,'#a09890')},`📍 ${userProf.location}`));
  if(userProf.website){const a=el('a',{href:userProf.website,target:'_blank',style:{...S.sans(11,'#c17a4a'),textDecoration:'none'}},`🔗 ${userProf.website.replace(/^https?:\/\//,'')}`);meta.appendChild(a);}
  if(userProf.joinDate) meta.appendChild(el('span',{style:S.sans(11,'#a09890')},`📅 ${userProf.joinDate}`));
  info.appendChild(meta);
  const stats=div({display:'flex',gap:'20px',paddingBottom:'14px',borderBottom:'1px solid #ede8e0'});
  [['Publications',myPosts.length],['Abonnés',userProf.followers||0],['Abonnements',userProf.following||0]].forEach(([l,v])=>{
    const s=div({});
    s.appendChild(el('span',{style:{...S.sans(15,'#2a2420',700)}},v+' '));
    s.appendChild(el('span',{style:S.sans(12,'#a09890')},l));
    stats.appendChild(s);
  });
  info.appendChild(stats);
  root.appendChild(info);

  if(!myPosts.length) root.appendChild(p({...S.serif(14,'#a09890'),fontStyle:'italic',padding:'24px'},'Aucune publication.'));
  else myPosts.forEach(post=>{
    const pd=div({padding:'14px 16px',borderBottom:'1px solid #ede8e0'});
    if(post.content) pd.appendChild(p({...S.serif(14,'#3a3430'),margin:'0 0 8px',lineHeight:1.7},post.content));
    if(post.media?.url){
      const mw=div({borderRadius:'8px',overflow:'hidden',marginBottom:'8px'});
      mw.appendChild(post.media.type==='image'
        ?el('img',{src:post.media.url,loading:'lazy',style:{width:'100%',maxHeight:'220px',objectFit:'cover',display:'block'}})
        :el('video',{src:post.media.url,controls:true,style:{width:'100%',maxHeight:'220px',display:'block'}}));
      pd.appendChild(mw);
    }
    pd.appendChild(el('span',{style:S.sans(11,'#c5bfb8')},`♡ ${post.likes||0}`));
    root.appendChild(pd);
  });
  return root;
}

// EDIT PROFILE
// ══════════════════════════════════════════════════════════════════
function renderEditProfile(){
  const me=STATE.userProfile||{};
  if(!STATE.editForm) STATE.editForm={
    displayName:me.displayName||'',bio:me.bio||'',
    location:me.location||'',website:me.website||'',
    avatarColor:me.avatarColor||AV_COLORS[0],avatarFile:null,avatarPreview:me.photoURL||null
  };
  const ef=STATE.editForm;
  const setEF=(k,v)=>{
    STATE.editForm={...STATE.editForm,[k]:v};
    // Don't re-render on text input, only on color/photo changes
    if(k==='avatarColor'||k==='avatarPhoto'||k==='avatarFile'||k==='avatarPreview') render();
  };
  const root=div({paddingBottom:'40px'});

  const tb=div({padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #ede8e0'});
  tb.appendChild(btn({background:'none',border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontSize:'13px',color:'#a09890',padding:'0'},'← Annuler',()=>setState({editing:false,editForm:null})));
  tb.appendChild(el('span',{style:{...S.sans(13,'#2a2420',600)}},'Modifier le profil'));
  let saving=false;
  tb.appendChild(btn({...S.BTN,width:'auto',padding:'6px 16px',marginTop:'0'},'Enregistrer',async()=>{
    if(saving)return;saving=true;
    try{
      // Always read latest values from STATE.editForm
      const sf=STATE.editForm;
      const upd={
        displayName: (sf.displayName||'').trim()||me.displayName,
        bio:         (sf.bio||'').trim(),
        location:    (sf.location||'').trim(),
        website:     (sf.website||'').trim(),
        avatarColor: sf.avatarColor||me.avatarColor||AV_COLORS[0]
      };
      if(sf.avatarFile){
        // Avatar → base64 compressed
        try {
          upd.photoURL = await new Promise((res,rej)=>{
            const img=new Image();
            img.onload=()=>{
              const SIZE=80;
              const canvas=document.createElement('canvas');
              canvas.width=SIZE;canvas.height=SIZE;
              const ctx=canvas.getContext('2d');
              const s=Math.min(img.width,img.height);
              const ox=(img.width-s)/2, oy=(img.height-s)/2;
              ctx.drawImage(img,ox,oy,s,s,0,0,SIZE,SIZE);
              let q=0.5, data=canvas.toDataURL('image/jpeg',q);
              while(data.length>700000&&q>0.1){q-=0.1;data=canvas.toDataURL('image/jpeg',q);}
              res(data);
            };
            img.onerror=rej;
            img.src=URL.createObjectURL(sf.avatarFile);
          });
          if(upd.photoURL&&upd.photoURL.length>900000){
            toast('Photo trop lourde',true);saving=false;return;
          }
        } catch(e){ toast('Erreur photo',true);saving=false;return; }
      }
      await updateDoc(doc(db,'users',STATE.currentUser.uid),upd);
      await updateProfile(STATE.currentUser,{displayName:upd.displayName,...(upd.photoURL?{photoURL:upd.photoURL}:{})});
      STATE.userProfile={...STATE.userProfile,...upd};
      STATE.users[STATE.currentUser.uid]=STATE.userProfile;
      toast('Profil mis à jour !');
      setState({editing:false,editForm:null});
    }catch(e){toast('Erreur : '+e.message,true);console.error(e);}
    saving=false;
  }));
  root.appendChild(tb);

  // Avatar preview
  const avW=div({display:'flex',flexDirection:'column',alignItems:'center',padding:'24px 0 16px'});
  const avPreview={...me,...ef,photoURL:ef.avatarPreview};
  const avClick=div({position:'relative',cursor:'pointer'});
  avClick.appendChild(Avatar(avPreview,76));
  avClick.appendChild(div({position:'absolute',inset:'0',borderRadius:'50%',background:'rgba(0,0,0,0.3)',display:'flex',alignItems:'center',justifyContent:'center'},[el('span',{style:{fontSize:'18px'}},'📷')]));
  const fileInp=el('input',{type:'file',accept:'image/*',style:{display:'none'}});
  fileInp.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;setEF('avatarFile',f);setEF('avatarPreview',URL.createObjectURL(f));e.target.value='';});
  avClick.addEventListener('click',()=>fileInp.click());
  avW.appendChild(avClick);avW.appendChild(fileInp);
  avW.appendChild(el('span',{style:{...S.sans(11,'#a09890'),marginTop:'8px'}},'Appuyer pour changer'));
  if(ef.avatarPreview&&ef.avatarFile) avW.appendChild(btn({...S.LINK,fontSize:'11px',marginTop:'4px'},'✕ Retirer',()=>setEF('avatarPreview',null)));
  root.appendChild(avW);

  // Colors
  if(!ef.avatarPreview){
    const cp=div({padding:'0 16px 16px'});
    cp.appendChild(el('label',{style:S.LBL},"Couleur de l'avatar"));
    const row=div({display:'flex',gap:'8px',flexWrap:'wrap',marginTop:'6px'});
    AV_COLORS.forEach(c=>{
      const dot=div({width:'28px',height:'28px',borderRadius:'50%',background:c,cursor:'pointer',border:ef.avatarColor===c?'3px solid #2a2420':'2px solid transparent',boxShadow:ef.avatarColor===c?'0 0 0 2px #fff':'none',transition:'all 0.15s'});
      dot.addEventListener('click',()=>setEF('avatarColor',c));
      row.appendChild(dot);
    });
    cp.appendChild(row);
    root.appendChild(cp);
  }

  const mkF=(label,key,type,ph)=>{
    const w=div({marginBottom:'18px'});
    w.appendChild(el('label',{style:S.LBL},label));
    const inp=el('input',{type:type||'text',value:ef[key]||'',placeholder:ph||'',style:{width:'100%',border:'none',borderBottom:'1.5px solid #d5cfc8',outline:'none',padding:'8px 0',fontFamily:"'Lora',serif",fontSize:'14px',color:'#2a2420',background:'transparent',display:'block'}});
    inp.addEventListener('input',e=>{ if(STATE.editForm) STATE.editForm[key]=e.target.value; });
    w.appendChild(inp);
    return w;
  };
  const fields=div({padding:'0 16px'});
  fields.appendChild(mkF('Nom complet','displayName','text','Votre nom'));
  const bioW=div({marginBottom:'18px'});
  bioW.appendChild(el('label',{style:S.LBL},'Bio'));
  const bioTA=el('textarea',{placeholder:'En quelques mots…',rows:3,style:{width:'100%',border:'none',borderBottom:'1.5px solid #d5cfc8',outline:'none',padding:'8px 0',fontFamily:"'Lora',serif",fontSize:'14px',color:'#2a2420',background:'transparent',resize:'none',lineHeight:1.6,display:'block'}});
  bioTA.value=ef.bio||'';bioTA.addEventListener('input',e=>{ if(STATE.editForm) STATE.editForm.bio=e.target.value; });

function renderExplore(){

  const allUsers=Object.values(STATE.users).filter(u=>{
    if(u.uid===STATE.currentUser.uid||!u.handle) return false;
    if(!q) return true;
    return (u.handle||'').toLowerCase().includes(q)||(u.displayName||'').toLowerCase().includes(q);
  });

  // Search bar — no re-render on keystroke, filter on submit/enter only
  const searchBar=div({padding:'14px 16px',borderBottom:'1px solid #ede8e0',background:'#faf7f3'});
  const searchWrap=div({display:'flex',alignItems:'center',gap:'10px',background:'#f0ebe4',borderRadius:'20px',padding:'8px 14px'});
  const searchInp=el('input',{type:'search',placeholder:'Rechercher un pseudo...',value:STATE.exploreSearch||'',style:{flex:1,border:'none',outline:'none',background:'transparent',fontFamily:"'DM Sans',sans-serif",fontSize:'14px',color:'#2a2420'}});
  // Update state without re-render on each keystroke
  searchInp.addEventListener('input',e=>{ STATE.exploreSearch=e.target.value; filterExplore(root, list, me); });
  searchWrap.appendChild(el('span',{style:{fontSize:'14px',color:'#a09890',flexShrink:0}},'🔍'));
  searchWrap.appendChild(searchInp);
  const clrBtn=div({cursor:'pointer',color:'#a09890',fontSize:'16px',flexShrink:0,display:STATE.exploreSearch?'block':'none'},['✕']);
  clrBtn.addEventListener('click',()=>{ STATE.exploreSearch=''; searchInp.value=''; filterExplore(root, list, me); clrBtn.style.display='none'; });
  searchWrap.appendChild(clrBtn);
  searchBar.appendChild(searchWrap);
  root.appendChild(searchBar);

  const list=div({padding:'0 16px'});
  buildExploreList(list, me, allUsers, q);

function filterExplore(root, list, me) {
  const q=(STATE.exploreSearch||'').toLowerCase().trim();
  const allUsers=Object.values(STATE.users).filter(u=>{
    if(u.uid===STATE.currentUser.uid||!u.handle) return false;
    if(!q) return true;
    return (u.handle||'').toLowerCase().includes(q)||(u.displayName||'').toLowerCase().includes(q);
  });
  list.innerHTML='';
  buildExploreList(list, me, allUsers, q);
}

function buildExploreList(list, me, allUsers, q) {
  if(!allUsers.length){
    list.appendChild(div({padding:'40px 0',display:'flex',flexDirection:'column',alignItems:'center',gap:'10px'},[
      el('div',{style:{fontSize:'28px',opacity:'0.3'}},'◎'),
      p({fontFamily:"'Lora',serif",fontSize:'14px',color:'#a09890',fontStyle:'italic',textAlign:'center'},q?'Aucun résultat pour "'+q+'"':'Aucun profil trouvé.')
    ]));
    return;
  }
  if(q) list.appendChild(el('div',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'11px',color:'#a09890',padding:'12px 0 4px'}},allUsers.length+' résultat'+(allUsers.length>1?'s':'')));
  allUsers.forEach(u=>{
    const followed=(me.followingIds||[]).includes(u.uid);
    const row=div({display:'flex',gap:'12px',alignItems:'flex-start',padding:'12px 0',borderBottom:'1px solid #ede8e0'});
    const cz=div({display:'flex',gap:'12px',alignItems:'flex-start',flex:1,cursor:'pointer',minWidth:0});
    cz.appendChild(Avatar(u,42));
    const info=div({flex:1,minWidth:0});
    const nh=div({display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap',marginBottom:'2px'});
    nh.appendChild(el('span',{style:{...S.sans(14,'#2a2420',600)}},u.displayName||''));
    if(u.handle) nh.appendChild(el('span',{style:S.sans(12,'#a09890')},'@'+u.handle));
    const egb=GradeBadge(u,true); if(egb) nh.appendChild(egb);
    info.appendChild(nh);
    if(u.bio) info.appendChild(p({...S.serif(12,'#5a504a'),margin:'0 0 3px',lineHeight:1.5},u.bio));
    info.appendChild(el('div',{style:S.sans(11,'#c5bfb8')},(u.followers||0)+' abonnés'));
    cz.appendChild(info);
    cz.addEventListener('click',()=>setState({profileUid:u.uid,tab:'profile'}));
    row.appendChild(cz);
    row.appendChild(btn({background:followed?'#2a2420':'none',border:'1px solid '+(followed?'#2a2420':'#d5cfc8'),padding:'5px 12px',borderRadius:'16px',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:followed?'#f5f0ea':'#5a504a',cursor:'pointer',flexShrink:0,transition:'all 0.2s'},followed?'Abonné ✓':'Suivre',async()=>{
      const myRef=doc(db,'users',STATE.currentUser.uid);
      const thRef=doc(db,'users',u.uid);
      try{
        if(followed){
          await updateDoc(myRef,{following:increment(-1),followingIds:arrayRemove(u.uid)});
          await updateDoc(thRef,{followers:increment(-1)});
        }else{
          await updateDoc(myRef,{following:increment(1),followingIds:arrayUnion(u.uid)});
          await updateDoc(thRef,{followers:increment(1)});
        }
        const thSnap=await getDoc(thRef);
        if(thSnap.exists()) STATE.users[u.uid]={uid:u.uid,...thSnap.data()};
        render();
      }catch(e){console.error(e);}
    }));
    list.appendChild(row);
  });
}

// ══════════════════════════════════════════════════════════════════
// MESSAGES (local pour l'instant — Firestore-ready)
// ══════════════════════════════════════════════════════════════════
// ── Messaging helpers ─────────────────────────────────────────────
function convKey(uid1, uid2) {
  return [uid1, uid2].sort().join('_');
}

function getMutualFollows() {
  const me = STATE.userProfile || {};
  const myFollowing = me.followingIds || [];
  const iAmAdmin = me.isAdmin || me.isSuperAdmin;
  return Object.values(STATE.users).filter(u => {
    if (u.uid === STATE.currentUser?.uid) return false;
    if (!u.handle) return false;
    const theyFollowMe = (u.followingIds || []).includes(STATE.currentUser?.uid);
    const iFollowThem = myFollowing.includes(u.uid);
    // Admin/SuperAdmin can message anyone they follow (one-way is enough)
    if (iAmAdmin) return iFollowThem || theyFollowMe;
    // SuperAdmins/Admins appear in everyone's list if there is mutual follow
    if (u.isAdmin || u.isSuperAdmin) return iFollowThem && theyFollowMe;
    // Normal users: strict mutual follow required
    return theyFollowMe && iFollowThem;
  });
}

// Subscribe to a conversation in real-time
function subscribeToConv(uid) {
  if (unsubConv) { unsubConv(); unsubConv = null; }
  const key = convKey(STATE.currentUser.uid, uid);
  const convRef = doc(db, 'conversations', key);
  unsubConv = onSnapshot(convRef, snap => {
    if (snap.exists()) {
      STATE.msgConvs[key] = snap.data();
    } else {
      STATE.msgConvs[key] = { messages: [] };
    }
    render();
  });
}

function getConvMessages(uid) {
  const key = convKey(STATE.currentUser.uid, uid);
  return (STATE.msgConvs[key] || { messages: [] }).messages || [];
}

// ── MESSAGES VIEW ─────────────────────────────────────────────────
function renderMessages() {
  const mutual = getMutualFollows();
  const activeUid = STATE.msgActive;

  // If a conversation is open, show it full screen
  if (activeUid) {
    return renderConversation(activeUid);
  }

  // Unsubscribe from any active conv listener when back on list
  if (unsubConv) { unsubConv(); unsubConv = null; }

  const root = div({ minHeight: '400px' });

  // Header
  const hd = div({ padding: '18px 16px 12px', borderBottom: '1px solid #ede8e0' });
  hd.appendChild(el('div', { style: { fontFamily: "'DM Sans',sans-serif", fontSize: '11px', fontWeight: 600, color: '#a09890', textTransform: 'uppercase', letterSpacing: '0.1em' } }, 'Messages'));
  root.appendChild(hd);

  if (!mutual.length) {
    const empty = div({ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '60px 28px', gap: '12px' });
    empty.appendChild(el('div', { style: { fontSize: '36px', opacity: '0.3' } }, '◇'));
    empty.appendChild(p({ fontFamily: "'Lora',serif", fontSize: '14px', color: '#a09890', fontStyle: 'italic', textAlign: 'center' }, 'Aucune conversation disponible.'));
    empty.appendChild(p({ fontFamily: "'DM Sans',sans-serif", fontSize: '12px', color: '#c5bfb8', textAlign: 'center' }, 'Suivez-vous mutuellement pour envoyer des messages.'));
    root.appendChild(empty);
    return root;
  }

  mutual.forEach(u => {
    const messages = getConvMessages(u.uid);
    const last = messages[messages.length - 1];
    const unread = messages.filter(m => m.senderId !== STATE.currentUser.uid && !m.read).length;

    const row = div({ display: 'flex', gap: '14px', alignItems: 'center', padding: '14px 16px', borderBottom: '1px solid #ede8e0', cursor: 'pointer' });
    row.addEventListener('click', () => {
      subscribeToConv(u.uid);
      setState({ msgActive: u.uid });
    });
    row.onmouseenter = () => row.style.background = '#f5f0ea';
    row.onmouseleave = () => row.style.background = 'transparent';
    row.appendChild(Avatar(u, 46));

    const info = div({ flex: 1, minWidth: '0' });
    const nameRow = div({ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '3px' });
    nameRow.appendChild(el('span', { style: { fontFamily: "'DM Sans',sans-serif", fontSize: '14px', fontWeight: 600, color: '#2a2420' } }, u.displayName || ''));
    nameRow.appendChild(el('span', { style: { fontFamily: "'DM Sans',sans-serif", fontSize: '11px', color: '#a09890' } }, '@' + (u.handle || '')));
    const mlgb=GradeBadge(u,true); if(mlgb) nameRow.appendChild(mlgb);
    info.appendChild(nameRow);
    if (last) {
      const isMe = last.senderId === STATE.currentUser.uid;
      info.appendChild(el('div', { style: { fontFamily: "'DM Sans',sans-serif", fontSize: '12px', color: unread ? '#2a2420' : '#a09890', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: unread ? 600 : 400 } }, (isMe ? 'Vous : ' : '') + last.text));
    } else {
      info.appendChild(el('div', { style: { fontFamily: "'Lora',serif", fontSize: '12px', color: '#c5bfb8', fontStyle: 'italic' } }, 'Commencer la conversation'));
    }
    row.appendChild(info);
    if (unread > 0) {
      row.appendChild(div({ background: '#c17a4a', color: '#fff', borderRadius: '50%', width: '18px', height: '18px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'DM Sans',sans-serif", fontSize: '10px', fontWeight: 600, flexShrink: 0 }, [String(unread)]));
    } else {
      row.appendChild(el('span', { style: { fontFamily: "'DM Sans',sans-serif", fontSize: '16px', color: '#c5bfb8' } }, '›'));
    }
    root.appendChild(row);
  });

  return root;
}

// ── CONVERSATION VIEW (Firebase real-time) ───────────────────────
function renderConversation(uid) {
  const u = STATE.users[uid] || { displayName: '?', handle: '?' };
  const messages = getConvMessages(uid);
  const key = convKey(STATE.currentUser.uid, uid);

  // Mark incoming messages as read in Firestore
  const hasUnread = messages.some(m => m.senderId !== STATE.currentUser.uid && !m.read);
  if (hasUnread) {
    const updated = messages.map(m =>
      m.senderId !== STATE.currentUser.uid ? { ...m, read: true } : m
    );
    updateDoc(doc(db, 'conversations', key), { messages: updated }).catch(() => {});
  }

  const root = div({ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 140px)' });

  // Header
  const hd = div({ padding: '12px 16px', borderBottom: '1px solid #ede8e0', display: 'flex', gap: '12px', alignItems: 'center', flexShrink: 0 });
  hd.appendChild(btn({ background: 'none', border: 'none', cursor: 'pointer', fontSize: '18px', color: '#a09890', padding: '0', lineHeight: 1 }, '←', () => {
    if (unsubConv) { unsubConv(); unsubConv = null; }
    setState({ msgActive: null });
  }));
  hd.appendChild(Avatar(u, 34));
  const hInfo = div({ flex: 1, minWidth: '0' });
  const msgNameRow=div({display:'flex',alignItems:'center',gap:'6px'});
  msgNameRow.appendChild(el('div', { style: { fontFamily: "'DM Sans',sans-serif", fontSize: '14px', fontWeight: 600, color: '#2a2420' } }, u.displayName || ''));
  const mgb=GradeBadge(u,true); if(mgb) msgNameRow.appendChild(mgb);
  hInfo.appendChild(msgNameRow);
  hInfo.appendChild(el('div', { style: { fontFamily: "'DM Sans',sans-serif", fontSize: '11px', color: '#a09890' } }, '@' + (u.handle || '')));
  hd.appendChild(hInfo);
  root.appendChild(hd);

  // Messages
  const msgsDiv = div({ flex: 1, padding: '14px 16px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '8px' });

  if (!messages.length) {
    const empty = div({ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flex: 1, gap: '8px' });
    empty.appendChild(el('div', { style: { fontSize: '28px', opacity: '0.3' } }, '◇'));
    empty.appendChild(p({ fontFamily: "'Lora',serif", fontSize: '13px', color: '#c5bfb8', fontStyle: 'italic' }, 'Commencez la conversation'));
    msgsDiv.appendChild(empty);
  } else {
    messages.forEach((m, idx) => {
      const isMe = m.senderId === STATE.currentUser.uid;
      const mb = div({ display: 'flex', justifyContent: isMe ? 'flex-end' : 'flex-start', alignItems: 'flex-end', gap: '6px' });
      const bubble = div({
        maxWidth: '72%', padding: '9px 13px',
        borderRadius: isMe ? '16px 16px 3px 16px' : '16px 16px 16px 3px',
        background: isMe ? '#2a2420' : '#f0ebe4',
        fontFamily: "'Lora',serif", fontSize: '14px', lineHeight: 1.6,
        color: isMe ? '#f5f0ea' : '#3a3430'
      }, [m.text]);

      // Time
      const ts = m.ts ? new Date(m.ts).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';
      const timeEl = el('div', { style: { fontFamily: "'DM Sans',sans-serif", fontSize: '9px', color: isMe ? 'rgba(245,240,234,0.5)' : '#c5bfb8', marginTop: '3px', textAlign: isMe ? 'right' : 'left' } }, ts);

      const bubbleWrap = div({ maxWidth: '72%' }, [bubble, timeEl]);

      if (isMe) {
        const delBtn = btn({ background: 'none', border: 'none', cursor: 'pointer', color: '#c5bfb8', fontSize: '11px', padding: '0 4px', alignSelf: 'center', flexShrink: 0, opacity: '0', transition: 'opacity 0.2s' }, '✕', async () => {
          const updated = messages.filter((_, i) => i !== idx);
          try { await updateDoc(doc(db, 'conversations', key), { messages: updated }); } catch(e) { console.error(e); }
        });
        mb.appendChild(delBtn);
        mb.appendChild(bubbleWrap);
        mb.onmouseenter = () => delBtn.style.opacity = '1';
        mb.onmouseleave = () => delBtn.style.opacity = '0';
        let pressTimer;
        bubble.addEventListener('touchstart', () => { pressTimer = setTimeout(() => delBtn.style.opacity = '1', 600); });
        bubble.addEventListener('touchend', () => clearTimeout(pressTimer));
      } else {
        mb.appendChild(bubbleWrap);
      }
      msgsDiv.appendChild(mb);
    });
  }
  root.appendChild(msgsDiv);
  setTimeout(() => msgsDiv.scrollTop = msgsDiv.scrollHeight, 30);

  // Input
  const inp = div({ padding: '10px 16px', borderTop: '1px solid #ede8e0', display: 'flex', gap: '8px', flexShrink: 0 });
  const ti = el('input', { type: 'text', placeholder: 'Envoyer un message...', value: STATE.msgInput || '', style: { flex: 1, border: 'none', borderBottom: '1px solid #d5cfc8', outline: 'none', padding: '6px 0', fontFamily: "'Lora',serif", fontSize: '14px', color: '#2a2420', background: 'transparent' } });
  ti.addEventListener('input', e => { STATE.msgInput = e.target.value; });
  const send = async () => {
    const txt = STATE.msgInput?.trim();
    if (!txt) return;
    STATE.msgInput = '';
    const newMsg = { senderId: STATE.currentUser.uid, text: txt, ts: Date.now(), read: false };
    const convRef = doc(db, 'conversations', key);
    try {
      const snap = await getDoc(convRef);
      if (snap.exists()) {
        await updateDoc(convRef, { messages: arrayUnion(newMsg), updatedAt: serverTimestamp() });
      } else {
        await setDoc(convRef, { participants: [STATE.currentUser.uid, uid], messages: [newMsg], updatedAt: serverTimestamp() });
      }
    } catch(e) { console.error(e); toast('Erreur envoi', true); }
  };
  ti.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  inp.appendChild(ti);
  inp.appendChild(btn({ background: '#2a2420', color: '#f5f0ea', border: 'none', width: '32px', height: '32px', borderRadius: '50%', fontSize: '14px', cursor: 'pointer', flexShrink: 0 }, '↑', send));
  root.appendChild(inp);

  return root;
}

            const newGrade = val === 'none' ? null : val;

    msg.style.cssText="font-family:'DM Sans',sans-serif;font-size:13px;color:#7a7068;margin-bottom:22px;line-height:1.6;";
    msg.innerHTML='Supprimer '+(conf.type==='user'?'le compte':'la publication')+' <strong style="color:'+TXT+'">« '+conf.name+' »</strong> ?'+(conf.type==='user'?' Ses publications seront aussi supprimées.':'');
    modal.appendChild(msg);

    mbtns.appendChild(btn({flex:1,background:'none',border:'1px solid '+BDR,padding:'11px',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:MUTED,cursor:'pointer',borderRadius:'2px'},'Annuler',()=>setState({adminConfirm:null})));
    mbtns.appendChild(btn({flex:1,background:DANGER,border:'none',padding:'11px',fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#fff',cursor:'pointer',borderRadius:'2px',fontWeight:600},'Supprimer',async()=>{
      if(conf.type==='post'){
        try{await deleteDoc(doc(db,'posts',conf.id));}catch(e){console.error(e);}
        setState({adminConfirm:null});
      } else {
        try{
          const ups=STATE.posts.filter(p=>p.userId===conf.uid);
          await Promise.all(ups.map(p=>deleteDoc(doc(db,'posts',p.id))));
          await deleteDoc(doc(db,'users',conf.uid));
          delete STATE.users[conf.uid];
        }catch(e){console.error(e);}
        setState({adminConfirm:null});
      }
    }));
    modal.appendChild(mbtns);
    overlay.appendChild(modal);
    root.appendChild(overlay);
  }

  return root;
}

function renderApp(){
  const me=STATE.userProfile||{};
  const {tab,profileUid,editing}=STATE;

    {id:'feed',    label:'Fil',      icon:'≡'},
    {id:'explore', label:'Explorer', icon:'◎'},
    {id:'videos',  label:'Vidéos',   icon:'▶'},
    {id:'messages',label:'Messages', icon:'◇'},
    {id:'me',      label:'Profil',   icon:'○'},
    ...((me.isAdmin||me.isSuperAdmin)?[{id:'admin', label:me.isSuperAdmin?'S.Admin':'Admin', icon:me.isSuperAdmin?'★':'◈'}]:[]),
  ];
  const app=div({minHeight:'100vh',background:'#f5f0ea',display:'flex',justifyContent:'center'});

  const logo=div({display:'flex',alignItems:'baseline',gap:'8px'},[
    el('span',{style:{fontFamily:"'Lora',serif",fontWeight:500,fontSize:'21px',color:'#2a2420',letterSpacing:'-0.02em'}},'Æther'),
    el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'9px',color:'#c5bfb8',textTransform:'uppercase',letterSpacing:'0.12em'}},'réseau')
  ]);
  hd.appendChild(logo);
  const right=div({display:'flex',gap:'10px',alignItems:'center'});
  // Loupe button — only on videos tab
  if(tab==='videos'){
    const loupeActive=STATE.videoSearchOpen;
    const loupe=div({cursor:'pointer',fontSize:'16px',padding:'4px 6px',borderRadius:'8px',background:loupeActive?'#ede8e0':'transparent',color:loupeActive?'#2a2420':'#a09890',userSelect:'none'},'🔍');
    loupe.addEventListener('click',()=>{
      STATE.videoSearchOpen=!STATE.videoSearchOpen;
      if(!STATE.videoSearchOpen) STATE.videoSearch='';
      render();
    });
    right.appendChild(loupe);
  }
  if(me.handle) right.appendChild(el('span',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'12px',color:'#a09890'}},'@'+me.handle));
  right.appendChild(btn({background:'none',border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontSize:'11px',color:'#c5bfb8',padding:'0'},'Déco',async()=>{
    if(unsubPosts){unsubPosts();unsubPosts=null;}
    if(unsubConv){unsubConv();unsubConv=null;}
    if(unsubProfile){unsubProfile();unsubProfile=null;}
    await signOut(auth);
    STATE={...STATE,currentUser:null,userProfile:null,posts:[],users:{},tab:'feed',postsLoading:true};
    render();
  }));
  hd.appendChild(right);
  shell.appendChild(hd);

  // Content
  const content=div({flex:1,overflowY:'auto',paddingBottom:'72px'});

  else if(tab==='explore') content.appendChild(renderExplore());
  else if(tab==='videos')  content.appendChild(renderVideos());
  else if(tab==='messages')content.appendChild(renderMessages());
  else if(tab==='me'&&!editing)  content.appendChild(renderProfile(me,true,()=>{}));
  else if(tab==='me'&&editing)   content.appendChild(renderEditProfile());
  else if(tab==='admin'&&(me.isAdmin||me.isSuperAdmin)) content.appendChild(renderAdmin());

    const u=STATE.users[profileUid];
    if(u) content.appendChild(renderProfile(u,false,()=>setState({tab:'explore',profileUid:null})));
    else{ content.appendChild(Spinner()); fetchUserProfile(profileUid).then(()=>render()); }

  const nav=div({position:'fixed',bottom:'0',left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'560px',background:'#faf7f3',borderTop:'1px solid #ede8e0',display:'flex',zIndex:20,padding:'6px 0',paddingBottom:'calc(6px + env(safe-area-inset-bottom,0px))'});

    ],()=>{STATE.editing=false;STATE.editForm=null;setState({tab:item.id});
    // Preload users when switching to explore
    if(item.id==='explore'){
      getDocs(collection(db,'users')).then(snap=>{snap.forEach(d=>{STATE.users[d.id]={uid:d.id,...d.data()};});render();});
    }
    }));
  });
  shell.appendChild(nav);

  // Toast
  if(STATE.toast){
    const t=div({position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',background:STATE.toast.isErr?'#8a2010':'#2a2420',color:'#f5f0ea',padding:'10px 20px',borderRadius:'20px',fontFamily:"'DM Sans',sans-serif",fontSize:'13px',zIndex:50,whiteSpace:'nowrap',animation:'fadeIn 0.3s ease'},[STATE.toast.msg]);
    shell.appendChild(t);
  }

  app.appendChild(shell);
  return app;
}

// ══════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('root');
  const activeEl=document.activeElement;
  root.innerHTML='';
  try{
    if(!STATE.currentUser){
      document.body.style.background='#f5f0ea';
      root.appendChild(renderAuth());
    } else {
      document.body.style.background='#f5f0ea';
      root.appendChild(renderApp());
    }
  }catch(err){
    // Show error visibly on screen
    console.error('Render error:',err);
    root.innerHTML=`<div style="padding:30px;font-family:sans-serif;color:#c00;">
      <h3>Erreur de rendu</h3>
      <pre style="white-space:pre-wrap;font-size:12px;">${err.message}\n${err.stack}</pre>
      <br/><b>STATE.currentUser:</b> ${STATE.currentUser?STATE.currentUser.uid:'null'}<br/>
      <b>STATE.userProfile:</b> ${JSON.stringify(STATE.userProfile,null,2)}<br/>
      <b>STATE.tab:</b> ${STATE.tab}
    </div>`;
  }
}

// ── Auth state listener ───────────────────────────────────────────
onAuthStateChanged(auth, async user=>{
  if(user){
    STATE.currentUser=user;
    STATE.authDone=false;
    // Retry loading profile up to 5 times (Firestore write may not be committed yet)
    let profile=null;
    for(let attempt=0;attempt<5;attempt++){
      try{
        const snap=await getDoc(doc(db,'users',user.uid));
        if(snap.exists()){
          profile={uid:user.uid,...snap.data()};
          break;
        }
      }catch(e){ console.warn('Profile fetch attempt',attempt,e); }
      // Wait before retry
      await new Promise(r=>setTimeout(r,800));
    }
    console.log('Auth: user logged in', user.uid, 'profile found:', !!profile);
    if(profile){
      STATE.userProfile=profile;
      STATE.users[user.uid]=profile;
    } else {
      // Profile not found - create a fallback so app doesn't stay blank
      const fallback={
        uid:user.uid,
        displayName:user.displayName||'Utilisateur',
        handle: user.email?.split('@')[0]?.toLowerCase().replace(/[^a-z0-9_]/g,'_')||'user',
        bio:'',followers:0,following:0,followingIds:[],
        avatarColor:AV_COLORS[0],
        joinDate:new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})
      };
      // Try to save fallback profile
      try{
        await setDoc(doc(db,'users',user.uid), {...fallback, createdAt:serverTimestamp()});
      }catch(e){ console.warn('Could not save fallback profile',e); }
      STATE.userProfile=fallback;
      STATE.users[user.uid]=fallback;
    }
    subscribeToPosts();
    subscribeToProfile(user.uid);
    // Load all user profiles so Messages and Explore work immediately
    getDocs(collection(db,'users')).then(snap=>{
      snap.forEach(d=>{ STATE.users[d.id]={uid:d.id,...d.data()}; });
      render();
    }).catch(()=>{});
    render();
  } else {
    STATE.currentUser=null;
    STATE.userProfile=null;
    STATE.posts=[];
    STATE.postsLoading=true;
    if(unsubPosts){unsubPosts();unsubPosts=null;}
    if(unsubProfile){unsubProfile();unsubProfile=null;}
    render();
  }
});

// Initial render (shows loading state)
render();
</script>
